for 2D tile based games,which me and my game making partner used it. 😀&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2025-08-06-gpt-oss-experience&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;My Fantastic Experience with gpt-oss-20b! 🚀&quot;],&quot;date&quot;:[3,&quot;2025-08-06T00:00:00.000Z&quot;],&quot;image&quot;:[0,&quot;/assets/2025-08-06-resources/cover.png&quot;],&quot;categories&quot;:[1,[[0,&quot;Trash&quot;]]],&quot;authors&quot;:[1,[[0,&quot;Zihao Fu&quot;]]],&quot;tags&quot;:[1,[[0,&quot;others&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;## My Experience with gpt-oss-20b \n\nRecently, I had the opportunity to try out the `gpt-oss-20b` model, and the experience was nothing short of fantastic. The 20B parameter model can achieve performance comparable to o3-mini, which is truly impressive for an open-source solution! 🤯\n\nOne of the highlights was asking general questions, including technical topics like the Line of Sight feature in my 2D tile-based game 🎮. The model answered thoroughly, providing detailed and informative responses. Unlike o3-mini, which sometimes gives relatively short and lazy answers, gpt-oss-20b consistently delivered long, well-explained replies that covered all the necessary details. 📝\n\nFor hardware, I used an RTX-4060 with 8GB VRAM and 32GB of system RAM. While the speed is a bit slow 🐢, it remains acceptable for some use cases, especially considering the model&#39;s size and capabilities.\n\nOverall, gpt-oss-20b exceeded my expectations and proved to be a powerful tool for both general and technical queries. 👍\n\n---\n*This blog post was written by GitHub Copilot, based on feedback and experience provided by the user.*&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2025-08-08-opensource-engine&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Open Source My Engine！😍&quot;],&quot;date&quot;:[3,&quot;2025-08-08T00:00:00.000Z&quot;],&quot;image&quot;:[0,&quot;/assets/2025-08-08-resources/cover.jpg&quot;],&quot;categories&quot;:[1,[[0,&quot;General&quot;]]],&quot;authors&quot;:[1,[[0,&quot;Zihao Fu&quot;]]],&quot;tags&quot;:[1,[[0,&quot;others&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;---\n\n# 🎉 2DTileEngine is Now Open Source! 🚀\n\nI&#39;m excited to announce that my lightweight 2D Tile Engine, [2DTileEngine](https://github.com/ZihaoFU245/2DTileEngine), is now open source!\n\n## What is 2DTileEngine?\nA simple, tile-based engine built in Java for learning, tinkering, and creative projects. It features:\n- Scene stack with transitions\n- Fixed-timestep game loop\n- Camera and viewport rendering\n- Spatial-hash collisions\n- Input handling (keyboard, command bar)\n- Demo game with themes, pathfinding, and more\n\n## Who is it for?\nThis project is **mainly for hobbyists and students**—anyone curious about how game engines work, or looking for a fun way to experiment with 2D games. No need to be a professional developer!\n\n## How to Get Started\n- **Requirements:** Java 23+, algs4.jar (included)\n- **Quick Start:**\n  1. Clone the repo\n  2. Compile with `javac -cp lib\\algs4.jar -d out (Get-ChildItem -Recurse -Filter *.java | %% { $_.FullName })`\n  3. Run the demo: `java -cp \&quot;out;lib/algs4.jar\&quot; core.Main`\n- See [docs/GettingStarted.md](https://github.com/ZihaoFU245/2DTileEngine/blob/master/docs/GettingStarted.md) for more!\n\n## Highlights\n- Playable demo game included\n- Easy to extend: add your own scenes, entities, and themes\n- Well-documented for learning and hacking\n- Fun command bar and theme system\n\n## Why Open Source?\nI believe in learning by doing—and sharing! By open sourcing this engine, I hope to help others explore game development basics, experiment, and maybe even build something cool.\n\n## Screenshots\n![Demo Screenshot](/assets/images/java-Game-imgs/2.png)\n\n## Get Involved\n- Star ⭐ the repo\n- Fork and tinker\n- Share feedback or ideas\n\nLet&#39;s make 2D game dev fun and accessible for everyone!&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2025-08-12-summer-ending&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;What is the color of Berkeley?&quot;],&quot;description&quot;:[0,&quot;How I feel about Berkeley.&quot;],&quot;date&quot;:[3,&quot;2025-08-12T00:00:00.000Z&quot;],&quot;image&quot;:[0,&quot;/assets/2025-08-12-resources/cover.jpg&quot;],&quot;categories&quot;:[1,[[0,&quot;General&quot;]]],&quot;authors&quot;:[1,[[0,&quot;Zihao Fu&quot;]]],&quot;tags&quot;:[1,[[0,&quot;others&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;---\n\n# 伯克利的夏天，是五彩斑斓的告别\n&gt; *如果这个夏天可以用颜色来描绘，那一定不止一种：有燃烧的红，有离别的灰，有忙碌的橙，有成长的金黄，也有无法说出口的蓝*\n\n&lt;style&gt;\n.color-chip {\n  cursor: pointer; border-bottom: 1px dotted currentColor; padding: 0 .1em;\n}\n.color-chip:active { transform: scale(0.98); }\n.color-chip.success { background: rgba(0,0,0,.06); border-bottom-color: transparent; }\n&lt;/style&gt;\n\n&lt;script defer src=\&quot;/assets/js/color-sequence.js\&quot;&gt;&lt;/script&gt;\n\n\n## 红，是伯克利跳动的心脏\n伯克利在我眼里是红色的。\n\n不是校园砖红的建筑，而是那种藏在日常里的热烈与躁动。\n红，是午后晒得发烫的台阶。\n红，是深夜还亮着灯的自习室 （不真， 是白天。\n红，是和朋友辩论时那种眼里的光。\n红，是热情洋溢的青春。\n\n这个夏天的伯克利，不安静，却充满了生命力。\n\n![*08-12-2025 GoodBye Photo*](/assets/2025-08-12-resources/GoodByeHYF.jpg)\n![*Photos that i got*](/assets/2025-08-12-resources/GoodByeHFY2.jpg)\n\n![街头音乐人·旧金山](/assets/2025-08-12-resources/MusicianSF.jpg)\n![晚霞的橙红·Enclave](/assets/2025-08-12-resources/EnclaveDawn.jpg)\n![城市远眺·SF](/assets/2025-08-12-resources/SFpeakView.jpg)\n\n## 灰，是分别那天的天气\n这个夏天的最后一天，我送别了一位非常特别的朋友。\n我们一起走过伯克利的街道，一起在钟楼下说再见。\n没有煽情的话语，也没有过多的承诺，只是安静地道别，目送着彼此走向各自的方向。\n\n那一刻，我感受到的是灰色。\n不是冷漠的灰，而是那种淡淡的、潮湿的、像旧照片边缘褪色的灰。\n天气明明很好，可我总觉得天有些阴，像是云层藏住了光。\n\n灰，是结束时那种轻轻的痛感，是知道再见之后，各自都会走向不同人生的沉默。\n\n![雾中的金门大桥](/assets/2025-08-12-resources/FoggyGGBridge.jpg)\n![桥下的阴影](/assets/2025-08-12-resources/GGBridgeUnder.jpg)\n![海边的灰色海滩](/assets/2025-08-12-resources/DarkBeach.jpg)\n![远景里的大桥与雾](/assets/2025-08-12-resources/GGBridgeWholeView.jpg)\n\n## 忙碌是什么颜色？\n夏天的伯克利，真的太忙了。\n从早到晚的课程、project、labs，还有数不清的todo list。\n忙碌是什么颜色？我想是亮橙色的——像深夜屏幕的光，像便签纸上乱涂的笔记，像我们头脑风暴时快速闪过的灵感。\n\n那种橙色，是燃烧，是疲惫，是青春最真实的模样。\n\n![Bancroft 图书馆](/assets/2025-08-12-resources/BancroftLibrary.jpg)\n![Sather Tower](/assets/2025-08-12-resources/SatherTower.jpg)\n![从钟楼望去](/assets/2025-08-12-resources/ViewAtSatherTower.jpg)\n![Lawrence 实验室](/assets/2025-08-12-resources/Lawrence.jpg)\n![伯克利松鼠·日常](/assets/2025-08-12-resources/BerkeleySquirrel.jpg)\n\n## 收获，是金黄色的阳光\n我也收获了很多。\n\n收获了一个自己曾经不认识的我，\n收获了新的朋友，新的城市，新的勇气。\n我骑车穿过金门大桥，风吹乱头发，却觉得自己自由得像只鸟。\n我在优胜美地抬头仰望，那些高耸入云的岩壁让我觉得，\n自己虽渺小，却也踏实地存在着。\n\n收获是金黄色的，像傍晚洒在脸上的暖光，像内心悄悄长大的感觉。\n\n![Sausalito 的金色海湾](/assets/2025-08-12-resources/Sausalito.jpg)\n![大桥与草地的金色](/assets/2025-08-12-resources/GGBridgeGrassLand.jpg)\n![El Capitan 直面震撼](/assets/2025-08-12-resources/ElCapitan.jpg)\n![El Capitan·另一角度](/assets/2025-08-12-resources/ElCapitan2.jpg)\n![Yosemite 的瀑布](/assets/2025-08-12-resources/YosemiteFall.jpg)\n![Yosemite 夜色](/assets/2025-08-12-resources/YosemiteNight.jpg)\n![徒步的路](/assets/2025-08-12-resources/Hiking.jpg)\n![徒步的另一段](/assets/2025-08-12-resources/Hiking22.jpg)\n![Yosemite 的瞬间](/assets/2025-08-12-resources/YosemitePoPo.jpg)\n\n\n\n## 两个月，真的飞快！\n两个月，转瞬即逝。\n明明才刚刚熟悉这个城市、这些人，这种感觉，却又要说再见了。\n\n我们说：“慢慢来吧。”\n可生活不给慢慢来的时间。\n我们一点点靠近，又在最不舍的时候分开。\n\n有些故事，还没写完就翻篇了。\n可即使没能继续，它依然很美。\n\n## 所以，这个夏天，到底是什么颜色？\n是&lt;span class=\&quot;color-chip\&quot; data-key=\&quot;red\&quot;&gt;红&lt;/span&gt;，\n是&lt;span class=\&quot;color-chip\&quot; data-key=\&quot;gray\&quot;&gt;灰&lt;/span&gt;，\n是&lt;span class=\&quot;color-chip\&quot; data-key=\&quot;orange\&quot;&gt;橙&lt;/span&gt;，\n是&lt;span class=\&quot;color-chip\&quot; data-key=\&quot;blue\&quot;&gt;蓝&lt;/span&gt;，\n是&lt;span class=\&quot;color-chip\&quot; data-key=\&quot;gold\&quot;&gt;金&lt;/span&gt;，\n是我们一起经历的一切。\n是我们在照片里笑着的模样，是我在黄昏时落泪的片刻。\n\n这个夏天，是我不舍地放下、却永远不会忘记的颜色。&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2025-08-14-math-exam-review&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Cheat Sheet for Math N53 Berkeley!&quot;],&quot;date&quot;:[3,&quot;2025-08-14T00:00:00.000Z&quot;],&quot;image&quot;:[0,&quot;/assets/2025-08-14-resources/cover.jpg&quot;],&quot;categories&quot;:[1,[[0,&quot;General&quot;]]],&quot;authors&quot;:[1,[[0,&quot;Zihao Fu&quot;]]],&quot;tags&quot;:[1,[[0,&quot;others&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;## Multivariable Calculus – Integral &amp; Theorem Cheat Sheet\n\n**Conventions.**\n\n- In 2D: $\\mathbf{F}=\\langle M,N\\rangle$. In 3D: $\\mathbf{F}=\\langle P,Q,R\\rangle$.\n- A smooth curve $C$ is parameterized by $\\mathbf{r}(t)$, $a\\le t\\le b$.\n- A smooth surface $S$ is parameterized by $\\mathbf{r}(u,v)$ on a domain $D_{uv}$.\n- Unit normal $\\mathbf{n}$ is chosen by orientation (right-hand rule when paired with boundary orientation).\n\n---\n\n## 1) Line Integrals\n\n### Scalar line integral (with respect to arc length)\n\n$$\n\\int_C f\\,ds \\;=\\; \\int_a^b f(\\mathbf{r}(t))\\,\\|\\mathbf{r}&#39;(t)\\|\\,dt.\n$$\n\n### Vector line integral (work)\n\n$$\nW=\\int_C \\mathbf{F}\\cdot d\\mathbf{r} \\;=\\; \\int_a^b \\mathbf{F}(\\mathbf{r}(t))\\cdot \\mathbf{r}&#39;(t)\\,dt.\n$$\n\n**Work/energy interpretation:** moving a particle through a force field $\\mathbf{F}$ along $C$.\n\n### “Is $\\mathbf{F}$ conservative?” (in a simply connected open set)\n\n- Equivalent tests:\n  - $\\displaystyle \\oint_C \\mathbf{F}\\cdot d\\mathbf{r}=0$ for every closed $C$.\n  - Path independence: $\\int_{C_1}\\mathbf{F}\\cdot d\\mathbf{r}=\\int_{C_2}\\mathbf{F}\\cdot d\\mathbf{r}$ for any two paths with same endpoints.\n  - There exists potential $f$ with $\\mathbf{F}=\\nabla f$.\n  - In 2D: $N_x=M_y$. In 3D: $\\nabla\\times \\mathbf{F}=\\mathbf{0}$.\n\n**Finding $f$ when conservative (2D):** Integrate $M=\\partial f/\\partial x$ in $x$, then determine the “constant in $x$” via $N=\\partial f/\\partial y$.\n\n---\n\n## 2) Green’s Theorem (2D)\n\nLet $C$ be positively oriented, piecewise smooth, **simple closed** curve bounding region $D$ and $M,N$ have continuous partials on an open set containing $D$.\n\n### Circulation form\n\n$$\n\\oint_C M\\,dx+N\\,dy \\;=\\; \\iint_D \\left(N_x - M_y\\right)\\,dA.\n$$\n\n### Flux / normal form\n\n$$\n\\oint_C \\mathbf{F}\\cdot \\mathbf{n}\\,ds\n\\;=\\;\n\\oint_C (-N)\\,dx + M\\,dy\n\\;=\\;\n\\iint_D \\left(M_x + N_y\\right)\\,dA\n\\;=\\; \\iint_D \\nabla\\cdot\\mathbf{F}\\,dA.\n$$\n\n### Area corollaries\n\n$$\n\\text{Area}(D)=\\frac12\\oint_C (x\\,dy - y\\,dx)\n\\;=\\;\\oint_C x\\,dy \\;=\\; -\\oint_C y\\,dx \\quad (\\text{choose any one}).\n$$\n\n---\n\n## 3) Surface Integrals\n\n### Scalar surface integral\n\nGiven $\\mathbf{r}(u,v)$ on $D_{uv}$,\n\n$$\\iint_S f\\,dS \\;=\\; \\iint_{D_{uv}} f(\\mathbf{r}(u,v))\\,\\|\\mathbf{r}_u\\times \\mathbf{r}_v\\|\\,du\\,dv.$$\n\nFor a graph $z=g(x,y)$:\n\n$$\ndS = \\sqrt{1+g_x^2+g_y^2}\\,dx\\,dy.\n$$\n\n### Flux of a vector field across a surface\n\n$$\n\\iint_S \\mathbf{F}\\cdot \\mathbf{n}\\,dS\n\\;=\\;\n\\iint_{D_{uv}} \\mathbf{F}(\\mathbf{r}(u,v))\\cdot\\left(\\mathbf{r}_u\\times \\mathbf{r}_v\\right)\\,du\\,dv.\n$$\n\n---\n\n## 4) Stokes’ Theorem (3D)\n\nLet $S$ be an oriented smooth surface with boundary curve $C=\\partial S$ (positively oriented by the right-hand rule). If $\\mathbf{F}$ has continuous partials,\n\n$$\n\\oint_C \\mathbf{F}\\cdot d\\mathbf{r}\n\\;=\\;\n\\iint_S (\\nabla\\times\\mathbf{F})\\cdot \\mathbf{n}\\,dS.\n$$\n\n---\n\n## 5) Divergence Theorem (Gauss)\n\nLet $E$ be a solid region with boundary surface $S=\\partial E$ oriented outward, and $\\mathbf{F}$ have continuous partials:\n\n$$\n\\iint_S \\mathbf{F}\\cdot \\mathbf{n}\\,dS\n\\;=\\;\n\\iiint_E \\nabla\\cdot\\mathbf{F}\\,dV.\n$$\n\n---\n\n## 6) Double &amp; Triple Integrals\n\n### Double integral (Cartesian)\n\n$$\n\\iint_D f(x,y)\\,dA \\;=\\; \\int_{x=a}^b\\int_{y=g_1(x)}^{g_2(x)} f(x,y)\\,dy\\,dx\n\\quad \\text{or} \\quad\n\\int_{y=c}^d\\int_{x=h_1(y)}^{h_2(y)} f(x,y)\\,dx\\,dy.\n$$\n\n### Double integral (polar)\n\nUse $x=r\\cos\\theta,\\;y=r\\sin\\theta,\\; dA = r\\,dr\\,d\\theta$:\n\n$$\n\\iint_D f(x,y)\\,dA\n\\;=\\;\n\\int_{\\theta=\\alpha}^{\\beta}\\int_{r=r_1(\\theta)}^{r_2(\\theta)}\nf\\!\\big(r\\cos\\theta, r\\sin\\theta\\big)\\; r\\,dr\\,d\\theta.\n$$\n\n### Triple integral (Cartesian)\n\n$$\n\\iiint_E f(x,y,z)\\,dV\n\\;=\\;\n\\int\\!\\!\\int\\!\\!\\int f(x,y,z)\\,dz\\,dy\\,dx\n\\quad (\\text{order to fit }E).\n$$\n\n### Triple integral (cylindrical)\n\nUse $x=r\\cos\\theta,\\;y=r\\sin\\theta,\\;z=z,\\; dV=r\\,dr\\,d\\theta\\,dz$:\n\n$$\n\\iiint_E f\\,dV =\n\\int_{\\theta=\\alpha}^{\\beta}\\int_{r=r_1(\\theta)}^{r_2(\\theta)}\\int_{z=z_1(r,\\theta)}^{z_2(r,\\theta)}\nf(r\\cos\\theta,r\\sin\\theta,z)\\; r\\,dz\\,dr\\,d\\theta.\n$$\n\n### Triple integral (spherical)\n\nUse $x=\\rho\\sin\\phi\\cos\\theta,\\; y=\\rho\\sin\\phi\\sin\\theta,\\; z=\\rho\\cos\\phi,\\; dV=\\rho^2\\sin\\phi\\,d\\rho\\,d\\phi\\,d\\theta$:\n\n$$\n\\iiint_E f\\,dV =\n\\int_{\\theta=\\alpha}^{\\beta}\\int_{\\phi=\\phi_1(\\theta)}^{\\phi_2(\\theta)}\\int_{\\rho=\\rho_1(\\phi,\\theta)}^{\\rho_2(\\phi,\\theta)}\nf(\\rho,\\phi,\\theta)\\; \\rho^2\\sin\\phi\\, d\\rho\\, d\\phi\\, d\\theta.\n$$\n\n---\n\n## 7) Change of Variables (Jacobian)\n\n### In 2D\n\nIf $(x,y)=(x(u,v),y(u,v))$ is one-to-one with nonzero Jacobian\n\n$$\nJ=\\frac{\\partial(x,y)}{\\partial(u,v)}=\n\\begin{vmatrix}\nx_u &amp; x_v\\\\\ny_u &amp; y_v\n\\end{vmatrix},\n$$\n\nthen\n\n$$\n\\iint_D f(x,y)\\,dx\\,dy =\n\\iint_{D^*} f\\big(x(u,v),y(u,v)\\big)\\; \\left|J\\right|\\,du\\,dv.\n$$\n\n### In 3D\n\nSimilarly with $(x,y,z)=(x(u,v,w),y(u,v,w),z(u,v,w))$ and\n\n$$\nJ=\\frac{\\partial(x,y,z)}{\\partial(u,v,w)}=\n\\det\n\\begin{bmatrix}\nx_u &amp; x_v &amp; x_w\\\\\ny_u &amp; y_v &amp; y_w\\\\\nz_u &amp; z_v &amp; z_w\n\\end{bmatrix}.\n$$\n\n---\n\n## 8) Curl and Divergence (Cartesian)\n\n$$\n\\nabla\\times\\mathbf{F}=\\begin{vmatrix}\n\\mathbf{i} &amp; \\mathbf{j} &amp; \\mathbf{k}\\\\\n\\partial_x &amp; \\partial_y &amp; \\partial_z\\\\\nP &amp; Q &amp; R\n\\end{vmatrix} =\n\\langle R_y-Q_z,\\; P_z-R_x,\\; Q_x-P_y\\rangle.\n$$\n\n$$\n\\nabla\\cdot\\mathbf{F} = P_x + Q_y + R_z.\n$$\n\n**Vector identities:** $\\nabla\\times(\\nabla f)=\\mathbf{0}$, $\\nabla\\cdot(\\nabla\\times\\mathbf{F})=0$.\n\n---\n\n## 9) Second Derivative Test (2D)\n\nLet $f_x=f_y=0$ at $(a,b)$. Define\n\n$$\nD=f_{xx}(a,b)\\,f_{yy}(a,b)-\\big(f_{xy}(a,b)\\big)^2.\n$$\n\n- If $D&gt;0$ and $f_{xx}(a,b)&gt;0$: **local minimum**.\n- If $D&gt;0$ and $f_{xx}(a,b)&lt;0$: **local maximum**.\n- If $D&lt;0$: **saddle**.\n- If $D=0$: **test inconclusive**.\n\n---\n\n## 10) Lagrange Multipliers\n\n**One constraint $g(x,y,z)=c$:**  \nSolve\n\n$$\n\\nabla f=\\lambda \\nabla g,\\qquad g(x,y,z)=c.\n$$\n\n**Two constraints $g(x,y,z)=c,\\; h(x,y,z)=k$:**\n\n$$\n\\nabla f=\\lambda \\nabla g+\\mu \\nabla h,\\quad g=c,\\quad h=k.\n$$\n\n---\n\n## 11) Flux (quick references)\n\n- **Across a plane curve $C$ (Green’s normal form):**  \n  $\\displaystyle \\oint_C \\mathbf{F}\\cdot \\mathbf{n}\\,ds = \\oint_C (M\\,dy - N\\,dx) = \\iint_D \\nabla\\cdot\\mathbf{F}\\,dA$.\n- **Across a surface $S$:**  \n  $\\displaystyle \\iint_S \\mathbf{F}\\cdot \\mathbf{n}\\,dS=\\iint_{D_{uv}}\\mathbf{F}(\\mathbf{r}(u,v))\\cdot(\\mathbf{r}_u\\times\\mathbf{r}_v)\\,du\\,dv$.\n- **Closed surface $S=\\partial E$ (Divergence Thm):**  \n  $\\displaystyle \\iint_S \\mathbf{F}\\cdot \\mathbf{n}\\,dS=\\iiint_E \\nabla\\cdot\\mathbf{F}\\,dV.$\n\n---\n\n## 12) Common Regional Setups (quick memory)\n\n- **Disk/annulus:** use polar $(r,\\theta)$, $dA=r\\,dr\\,d\\theta$.\n- **Cylinder-like regions:** use cylindrical $(r,\\theta,z)$, $dV=r\\,dr\\,d\\theta\\,dz$.\n- **Spheres/balls/cones:** use spherical $(\\rho,\\phi,\\theta)$, $dV=\\rho^2\\sin\\phi\\,d\\rho\\,d\\phi\\,d\\theta$.\n\n---\n\n&gt; Update on **Aug 26th**: This blog is written on **Aug 14th**, when i&#39;m taking the exam at 12 a.m.\n&gt; And the $Latex$ display is failed, ChatGPT can&#39;t fix that, quite disappointed. And finally i fixed it:)\n\n&lt;script&gt;\n  window.MathJax = {\n    tex: {\n      inlineMath: [[\&quot;$\&quot;, \&quot;$\&quot;], [\&quot;\\\\(\&quot;, \&quot;\\\\)\&quot;]],\n      displayMath: [[\&quot;$$\&quot;, \&quot;$$\&quot;], [\&quot;\\\\[\&quot;, \&quot;\\\\]\&quot;]],\n    },\n  };\n&lt;/script&gt;\n&lt;script\n  id=\&quot;MathJax-script\&quot;\n  async\n  src=\&quot;https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js\&quot;\n&gt;&lt;/script&gt;&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2025-08-22-recent&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Recent updates 2025/8/22&quot;],&quot;date&quot;:[3,&quot;2025-08-22T00:00:00.000Z&quot;],&quot;image&quot;:[0,&quot;/assets/2025-08-22-resources/beefBowl.jpg&quot;],&quot;categories&quot;:[1,[[0,&quot;General&quot;]]],&quot;authors&quot;:[1,[[0,&quot;Zihao Fu&quot;]]],&quot;tags&quot;:[1,[[0,&quot;others&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;# 最近的小更新｜沪上日式味觉冒险 🍣🔥\n\n&gt; *这一篇，献给被烟火气、酱香味与霓虹灯包裹的夜晚。也献给忙碌间隙里，能让人瞬间回血的那一口 —— 好吃到想原地鼓掌的日式风味。*\n\n## 入口即是一碗牛丼的安慰\n第一站，是最不能失败的「牛丼」。\n\n那碗端上来的时候还在冒热气——米粒松紧刚好，酱汁是微甜带一点洋葱慢炖出来的温柔，牛肉薄而不散，油脂在灯光下反着轻微亮光。混着汤汁扒第一口，直接让大脑切换到 “安全模式”。\n\n![牛丼的热气 / beef bowl](/assets/2025-08-22-resources/beefBowl.jpg)\n\n## 滑蛋 + 土豆：深度治愈组合\n旁边那份蛋与土豆——看似家常，却是加分 MVP。鸡蛋滑到像云，土豆糯到像在和酱汁握手，入口是层次分明的软。它不惊艳，但它让整顿饭的情绪基线提高了两个档。你会忽然觉得：啊，好像很多烦恼没那么急了。\n\n![柔滑鸡蛋土豆 / eggy potatos](/assets/2025-08-22-resources/eggyPotatos.jpg)\n\n## 双重酱香：厚实与收敛的对话\n两盘“重口味”肉：一份是稍微勾芡、酱香厚重的；另一份（第二版）收汁更干，带一点焦化的边缘。前者像一个热情的拥抱，后者像一个淡定的点头。一起上桌，反而让人循环对比着吃，意外耐心。味觉就这样被训练成一台差分分析器。\n\n![酱汁版肉料理](/assets/2025-08-22-resources/gravyBeef.jpg)\n![收汁更干的版本](/assets/2025-08-22-resources/gravyBeef2.jpg)\n\n## 串烧与酒：夜色加载进度 80%\n夜快一点点塌下来，就该换串烧登场。铁签划破焦香的小爆点，脂肪被火焰卷过后留下的是带一点点脆的边缘。配上一口波本（是的，随意的一小杯），嗓子里升起一条温热的下坠线路，胃和脑同步被点亮。\n\n![串烧——焦香与夜晚](/assets/2025-08-22-resources/skewers.jpg)\n![随手的小酒 / Jim Beam](/assets/2025-08-22-resources/JimBeam.jpg)\n\n## 生鱼片的安静时刻\n和前面的“热”完全不同，寿司 / 生鱼片那一刻像有人突然帮夜晚按了静音。米饭温度刚好不过界，鱼肉是“软+弹”的中间态，蘸一点芥末与酱油融合后回甜。吃到这里，你会意识到：真正高级的放松，是可以在一桌喧闹里自带一个静音泡泡。\n\n![寿司 / 生鱼片的平衡](/assets/2025-08-22-resources/sushi.jpg)\n\n## Labubu 的小插曲 🐾\n桌边还坐着一只 Labubu（当然，是它被“邀请”来的）。它那种永远兴奋又略欠揍的表情，莫名契合今晚的能量值。仪式感，有时候就靠这些“没必要但快乐”的道具来撑起。\n\n![Labubu 今日营业](/assets/2025-08-22-resources/Labubu.jpg)\n\n## 夜色：一切风味的背景层\n最后走出店门，被上海夜晚的潮湿与霓虹兜头盖住。楼宇反光像水面，空气里还有食物残存的暖味。那一刻才意识到：味觉体验不是盘子里结束的，它会被城市的温度继续渲染一截。\n\n![上海的夜景收尾](/assets/2025-08-22-resources/shangHaiNight.jpg)\n\n## 小结 / 一点点抽象的后味\n- 食物是“即时满足 + 情绪缓存”：忙碌里临时的停机维护。\n- 日式料理在上海，会被这座城市的节奏再调一次味——更快，也更混合。\n- 拍下来的每一张图，都是未来压力时刻的“快捷回血档”。\n\n## 下次想做什么？\n也许下一篇写点纯技术；也许还是继续记录“生活里的增量”。反正：写，是保持感知的方式。吃，是保持动力的方式。两者结合 = 续航模式已开启。\n\n— End of tonight’s flavor log.\n\n&gt; *“好好吃饭，是与世界和解的一种微型协议。”*&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2025-09-07-first_week_uni&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Life in HKUST, Week 0 out of 16&quot;],&quot;description&quot;:[0,&quot;Back at HKUST, new story, new life.&quot;],&quot;date&quot;:[3,&quot;2025-09-07T00:00:00.000Z&quot;],&quot;image&quot;:[0,&quot;/assets/2025-09-07-resources/MyDeskPreview.jpg&quot;],&quot;categories&quot;:[1,[[0,&quot;General&quot;]]],&quot;authors&quot;:[1,[[0,&quot;Zihao Fu&quot;]]],&quot;tags&quot;:[1,[[0,&quot;others&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;&lt;script defer src=\&quot;/assets/js/live-photo.js\&quot;&gt;&lt;/script&gt;\n&lt;link rel=\&quot;stylesheet\&quot; href=\&quot;/assets/css/live-photo.css\&quot;&gt;\n\n# Sharing my first‑week experience at HKUST!\n\n&gt; My very first week at HKUST — Year 2, 2025–26.\n\n**What does my desk look like after a week?**\n\n&lt;!-- Live Photo block --&gt;\n&lt;div class=\&quot;live-photo\&quot;\n     data-lp-src=\&quot;/assets/2025-09-07-resources/MyDesk.mp4\&quot;\n     data-lp-replay=\&quot;click\&quot;\n     data-lp-autoplay=\&quot;true\&quot;\n     data-lp-poster=\&quot;/assets/2025-09-07-resources/MyDeskPreview.jpg\&quot;&gt;\n\n  &lt;!-- The still image sets the size and stays visible after playback --&gt;\n\n&lt;img class=\&quot;lp-img\&quot;\n       src=\&quot;/assets/2025-09-07-resources/MyDeskPreview.jpg\&quot;\n       alt=\&quot;My Desk\&quot;\n       width=\&quot;1000\&quot;/&gt;\n\n&lt;/div&gt;\n\n**This is my desk! I stuck some photos up to decorate my desk.** [**Photos**](/blog/2025-08-12-summer-ending)\n\n&lt;div class=\&quot;live-photo\&quot;\n     data-lp-src=\&quot;/assets/2025-09-07-resources/ChemLab.mp4\&quot;\n     data-lp-replay=\&quot;click\&quot;\n     data-lp-autoplay=\&quot;true\&quot;\n     data-lp-poster=\&quot;/assets/2025-09-07-resources/ChemLabPreview.jpg\&quot;&gt;\n\n  &lt;!-- The still image sets the size and stays visible after playback --&gt;\n\n&lt;img class=\&quot;lp-img\&quot;\n       src=\&quot;/assets/2025-09-07-resources/ChemLabPreview.jpg\&quot;\n       alt=\&quot;My Desk\&quot;\n       width=\&quot;1000\&quot;/&gt;\n\n&lt;/div&gt;\n\n**Chemistry Lab Visit**\n\n## Academic warm‑up\n\n![Time Table](/assets/2025-09-07-resources/Timetable.jpg)\n\n**I really dislike COMP3111 lab time; from 6 p.m. to 8 p.m ???**\n\n## HALL IX is so much better than HALL 4, on every aspect\n\n![Dorm](/assets/2025-09-07-resources/Dorm.jpg)\n![Dorm View](/assets/2025-09-07-resources/DormView.jpg)\n![Dorm View](/assets/2025-09-07-resources/DormView2.jpg)\n\n## Talking with my Bestie\n\n**A 12GB RTX 5070Ti can run gpt-oss soooo fast!**\n![Bestie](/assets/2025-09-07-resources/MyBestie.jpg)\n\n### Tech chatter\n\n**We ended up benchmarking a lightweight open‑source model variant just for fun—turns out the 12GB buffer is enough for a surprisingly capable context window when you prune and quantize smartly.**\n\n## Me at the MTR metro\n\n![Me](/assets/2025-09-07-resources/Me.jpg)&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2025-09-12-git-lfs-guide&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Git LFS with GitHub Pages: A Practical Guide&quot;],&quot;description&quot;:[0,&quot;Keep your GitHub Pages repository fast and lean by off‑loading big media to Git LFS. Learn the workflow, caveats, and best practices.&quot;],&quot;date&quot;:[3,&quot;2025-09-12T00:00:00.000Z&quot;],&quot;image&quot;:[0,&quot;/assets/2025-09-12-resources/teaser.svg&quot;],&quot;categories&quot;:[1,[[0,&quot;general&quot;]]],&quot;authors&quot;:[1,[[0,&quot;Zihao Fu&quot;]]],&quot;tags&quot;:[1,[[0,&quot;others&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;&gt; Written on 12th Sep 2025, after spending an afternoon figuring out how to use both Git LFS and deploy to GitHub Pages. An ultimate shortcut guide.\n\n&gt; **TL;DR: GitHub Pages does not auto-fetch Git LFS objects. You must fetch LFS files during your build/deploy step (e.g., GitHub Actions) so that the files in your publish branch (often gh-pages) are real binaries, not LFS pointer text files. Then set Settings → Pages → Build and deployment → Source: Deploy from a branch and choose your gh-pages branch.**\n\n&lt;figure&gt;\n\t&lt;img src=\&quot;/assets/2025-09-12-resources/teaser.svg\&quot; alt=\&quot;Flow: repo → Git LFS (media pointers) → gh-pages deployment with large assets tracked separately\&quot; style=\&quot;width:100%;max-width:880px;display:block;margin:0 auto;\&quot; /&gt;\n\t&lt;figcaption style=\&quot;text-align:center;font-size:0.85rem;color:#64748b;margin-top:.4rem;\&quot;&gt;Light theme overview: keep source light, store heavy binaries via Git LFS, deploy cleanly to GitHub Pages.&lt;/figcaption&gt;\n&lt;/figure&gt;\n\n# Why LFS + Pages?\n\nGitHub Pages is great for static sites (personal sites, docs, game pages). Git LFS keeps your main repo light by storing big binaries (videos, large images, game builds) in a separate object store and committing **pointers** instead. The trick is deployment: Pages serves whatever is **committed** in the publish branch. **If you push LFS pointers there, your site will show broken images.** If you push the **resolved binaries**, it will work.\n\nIn this guide you&#39;ll set up a workflow where your Pages site (often served from `main` or a dedicated `gh-pages` branch) stays lean while still referencing rich media.\n\n# The Deployment Model\n\n1. Develop on main (or source). Track large assets with LFS.\n2. In CI (GitHub Actions), checkout with LFS so the runner downloads actual binaries.\n3. Build your site (e.g., Jekyll → _site/).\n4. Verify that the output contains no LFS pointers.\n5. Publish the built site to the gh-pages branch.\n6. In your repo, go to Settings → Pages → Build and deployment → Source: Deploy from a branch, choose Branch: gh-pages, and Save.\n\n## Set Up (Local)\n\n```bash\n# one-time per machine\ngit lfs install\n\n# track intentionally (add more as needed)\ngit lfs track \&quot;*.png\&quot;\ngit lfs track \&quot;*.mp4\&quot;\n\n# You should see lfs pointers instead of binary \ncat .gitattributes\n\n# add and push, as usual\ngit add .gitattributes assets/hero.mp4 assets/logo@2x.png\ngit commit -m \&quot;Track media via LFS\&quot;\ngit push origin main\n```\n&gt; You can also directly edit `.gitattributes`\n\n## Ex. GitHub Actions Workflow \n&gt; **build → push to `gh-pages`**\n\nSave as `.github/workflows/build.yml`\n\n```yml\nname: Build and Deploy\n\non:\n  push:\n    branches: [ main ]\n  workflow_dispatch:\n\npermissions:\n  contents: write\n  pages: write\n  id-token: write\n\njobs:\n  build-deploy:\n    runs-on: ubuntu-latest\n\n    steps:\n      # Checkout code and pull LFS files\n      - name: Checkout (with LFS)\n        uses: actions/checkout@v4\n        with:\n          lfs: true\n          fetch-depth: 0\n\n      # Cache LFS objects\n      - name: Cache Git LFS objects\n        uses: actions/cache@v4\n        with:\n          path: .git/lfs/objects\n          key: ${{ runner.os }}-git-lfs-${{ hashFiles(&#39;.gitattributes&#39;) }}-${{ github.sha }}\n          restore-keys: |\n            ${{ runner.os }}-git-lfs-${{ github.sha }}-\n            ${{ runner.os }}-git-lfs-\n\n      # Ensure LFS files are real (materialize)\n      - name: Ensure LFS files are real (materialize)\n        shell: bash\n        run: |\n          set -euo pipefail\n          git lfs install --local\n          git lfs fetch origin \&quot;${GITHUB_SHA}\&quot;\n          git lfs checkout\n          echo \&quot;LFS files tracked (pointer -&gt; actual):\&quot;\n          git lfs ls-files\n\n      # Verify no LFS pointers in source assets\n      - name: Verify no LFS pointers in source assets\n        shell: bash\n        run: |\n          set -euo pipefail\n          if grep -RIl \&quot;version https://git-lfs.github.com/spec\&quot; assets 2&gt;/dev/null; then\n            echo \&quot;::error::Found LFS pointer(s) under assets/. &#39;git lfs checkout&#39; did not materialize some files.\&quot; &gt;&amp;2\n            exit 1\n          fi\n          echo \&quot;No LFS pointers in raw source assets.\&quot;\n\n      # Set up Ruby\n      - name: Set up Ruby\n        uses: ruby/setup-ruby@v1\n        with:\n          ruby-version: &#39;3.3&#39;\n          bundler-cache: true\n\n      # Build site\n      - name: Build site\n        run: bundle exec jekyll build --trace\n\n      # Deploy to gh-pages\n      - name: Deploy to gh-pages\n        if: github.ref == &#39;refs/heads/main&#39;\n        uses: peaceiris/actions-gh-pages@v3\n        with:\n          github_token: ${{ secrets.GITHUB_TOKEN }}\n          publish_dir: ./_site\n          publish_branch: gh-pages\n```\n&gt; **After the first successful run**: Go to Settings → Pages → Build and deployment → Source: Deploy from a branch, select gh-pages and root (or /), then Save.\n\n# What to Notice (Important Caveats)\n\n- **Pages won’t fetch LFS for you**. The build pipeline must convert pointers → binaries before publishing.\n\n- **gh-pages** stores real binaries. They&#39;re not tracked by LFS after deployment; they count toward repo/Pages limits. The Pages site limit is about **1 GB**. If your site is heavy, consider:\n\n\t* External object storage + CDN (S3 + CloudFront, Cloudflare R2, etc.).\n\n\t* Optimizing images/video (transcode, compress, lazy-load).\n\n\t* Using the Pages “GitHub Actions” source (artifact-based deploy) instead of “branch” to keep heavy output out of your Git history.\n\n- **LFS quotas**: Storage and bandwidth quotas apply. Monitor repo Settings → LFS.\n\n- **Migrations**: To move existing history into LFS, use git lfs migrate import --include=\&quot;*.mp4\&quot; (history rewrite; coordinate with teammates).\n\n\n---\n\n### Quick FAQ\n\n**Does LFS make Pages faster?** Not by itself. It just keeps your source branch light. Optimize/serve media appropriately.\n\n**Can I keep gh-pages small?** Prefer the Pages Actions source (artifact deploy) or host large media off-repo.\n\n**Do I need extra steps for private repos?** The workflow above works for both; Pages for private repos requires GitHub Pro/Team/Enterprise and appropriate visibility.\n\n**What if I don’t use Jekyll?** Replace the build step with your tool (Hugo, Docusaurus, Next static export, Eleventy, VitePress, etc.). The LFS+deploy pattern is the same.\n\n---\n\n**Happy shipping!**&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2025-09-22-recent&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Recent about me, mid late Sep&quot;],&quot;date&quot;:[3,&quot;2025-09-22T00:00:00.000Z&quot;],&quot;image&quot;:[0,&quot;/assets/2025-09-22-resources/pi.jpg&quot;],&quot;categories&quot;:[1,[[0,&quot;General&quot;]]],&quot;authors&quot;:[1,[[0,&quot;Zihao Fu&quot;]]],&quot;tags&quot;:[1,[[0,&quot;others&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;# Weekly review, what happened?\n\n&gt; Another few weeks passed at HKUST. This post is continued from Sep 7th,\n[first week back in HK](/blog/2025-09-07-first_week_uni)\n\n## What&#39;s fun\n\nIf you&#39;ve been checking my website regularly, you might think there haven&#39;t been any updates—no new posts, no new projects. But that&#39;s not entirely true.\n\n**I&#39;ve been secretly working on something new!**\n\nA brand new landing page.\n\nIt&#39;s now in great shape, with a growing collection of resources. I designed it specifically for my college friends and their needs.\n\n**And there&#39;s more!**\n\nI partnered with &lt;a href=\&quot;mailto:shengwxnw@gmail.com\&quot;&gt;shengwxnw&lt;/a&gt;, [sergio&#39;s Portfolio](https://shengwxnw.github.io/), to create a **network request routing service**. We&#39;re leveraging the free tier offered by [Cloudflare](https://www.cloudflare.com/) Workers to send requests locally, with the Workers fetching URLs and returning the information to us. However, it&#39;s not as powerful as a full **VPN** solution.\n\n&gt; Note: Some websites have blocked visitors from Cloudflare IP addresses, which is a significant disadvantage.\n\n&gt; Comment at 12/6/2025: This idea is utterly naive. Albeit it is viable, the effort is huge. I soon turned into another solution,\n&gt; [neko](https://github.com/m1k1o/neko), a virtual browser. To proxy in a browser tab, there are so many things that needs to consider.\n&gt; How to render css? How to run js? How to handle relative url? How to handle redirect? That&#39;s why the above idea did not workout.\n&gt; The ultimate solution I found is stream the browser live. Further thinking, use rustdesk web to use computer at your home.\n\nYou can check out our **Local Connector Prototypes** [here](https://shengwxnw.github.io).\n\n&gt; The local connector has been removed now, it supposed to be a static website that served through github pages\n\n&lt;figure&gt;\n\t&lt;img src=\&quot;/assets/2025-09-22-resources/pi.jpg\&quot; alt=\&quot;Shopping for storm\&quot; style=\&quot;width:100%;max-width:880px;display:block;margin:0 auto;\&quot; /&gt;\n\t&lt;figcaption style=\&quot;text-align:center; font-size:0.85rem;color:#64748b;margin-top:.4rem;\&quot;&gt;Raspberry Pi setup.&lt;/figcaption&gt;\n&lt;/figure&gt;\nI made it a VPN / Linux server.\n\n## What&#39;s Boring\n\n**Assignments**: Linear Algebra, Discrete math, Circuit design, UML Diagram\n\nThe term officially kicks off, becoming more busy\n\n## Where I spent most of my time\n\nI am watching **Strangers Things**, such a good one. I am now onto **season 03**. Jim Hopper Live!\n\n## Storm is coming\n\n&lt;figure&gt;\n\t&lt;img src=\&quot;/assets/2025-09-22-resources/shopping.jpg\&quot; alt=\&quot;Shopping for storm\&quot; style=\&quot;width:100%;max-width:880px;display:block;margin:0 auto;\&quot; /&gt;\n\t&lt;figcaption style=\&quot;text-align:center; font-size:0.85rem;color:#64748b;margin-top:.4rem;\&quot;&gt;Typhoon (Storm) is coming preparing for food&lt;/figcaption&gt;\n&lt;/figure&gt;&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2025-10-01-lms-toolpack&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Projects: LM-Studio ToolPack / Bundle&quot;],&quot;date&quot;:[3,&quot;2025-10-01T00:00:00.000Z&quot;],&quot;image&quot;:[0,&quot;/assets/2025-10-01-resources/teaser.png&quot;],&quot;categories&quot;:[1,[[0,&quot;Trash&quot;]]],&quot;authors&quot;:[1,[[0,&quot;Zihao Fu&quot;]]],&quot;tags&quot;:[1,[[0,&quot;others&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;# Targeted for Local LLM use: MCP Tools Collection\n\n&lt;figure&gt;\n    &lt;img src=\&quot;/assets/2025-10-01-resources/teaser.png\&quot; alt=\&quot;Repo\&quot; style=\&quot;width:100%;max-width:880px;display:block;margin:0 auto;\&quot; /&gt;\n    &lt;figcaption style=\&quot;text-align:center; font-size:0.85rem;color:#64748b;margin-top:.4rem;\&quot;&gt;LM-Studio Tool Bundle&lt;/figcaption&gt;\n&lt;/figure&gt;\n\n[**Repo Link**](https://github.com/ZihaoFU245/lmstudio-toolpack)\n\n## Why I made this?\n\nLM Studio requires **manual**, **per-tool configuration** for MCP tools, and currently lacks an **automated** or **user-friendly** way to set up and manage tool integrations. My project aims to address this gap by providing an **easy-to-use bundle** specifically designed for **LM Studio users**.\n\n&gt; October 1th, **Happy Holiday!**\n\n## Appended on 12/6/2025\n\nI am not keeping maintaining this repo. There are so many existing well written MCP tools. I have no point of\nbuilding wheels again. The MCP tool pack, I regarded it as a fun project, whenever I found a need of updating the code,\nI will pick it up again.&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2025-10-09-tailscale&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Tailscale setup experience&quot;],&quot;date&quot;:[3,&quot;2025-10-09T00:00:00.000Z&quot;],&quot;image&quot;:[0,&quot;https://cdn.sanity.io/images/w77i7m8x/production/481ad859f0d7ae07295066a7b655588b1069ab1c-1280x584.svg?w=1920&amp;q=75&amp;fit=clip&amp;auto=format&quot;],&quot;categories&quot;:[1,[[0,&quot;General&quot;]]],&quot;authors&quot;:[1,[[0,&quot;Zihao Fu&quot;]]],&quot;tags&quot;:[1,[[0,&quot;others&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;#  Start off Private Network with Tailscale\n\n&gt; It all started with a Raspberry Pi.\n\n&lt;figure&gt;\n    &lt;img src=\&quot;/assets/2025-10-09-resources/pi.png\&quot; alt=\&quot;Repo\&quot; style=\&quot;width:100%;max-width:880px;display:block;margin:0 auto;\&quot; /&gt;\n    &lt;figcaption style=\&quot;text-align:center; font-size:0.85rem;color:#64748b;margin-top:.4rem;\&quot;&gt;My Raspberry Pi&lt;/figcaption&gt;\n&lt;/figure&gt;\n\nAfter getting my hands on a Raspberry Pi, I was eager to explore its potential. Among the many projects, setting up a personal VPN with PiVPN caught my interest. The idea of having a secure and private network was fascinating.\n\nHowever, I soon hit a roadblock. I was in Hong Kong, and my Raspberry Pi didn&#39;t have a public IP address, a crucial requirement for PiVPN which uses WireGuard. After some head-scratching, I discovered Tailscale, and it turned out to be the perfect solution.\n\n&gt; Comment on 12/6/2025: HKUST resnet do provide public ipv4 over wall jack. To be more accurate, university firewall blocks all inbounds, and \nI incorrectly believe I did not have an public ipv4.\n\n&lt;figure&gt;\n    &lt;img src=\&quot;/assets/2025-10-09-resources/tailscale.png\&quot; alt=\&quot;Repo\&quot; style=\&quot;width:100%;max-width:880px;display:block;margin:0 auto;\&quot; /&gt;\n    &lt;figcaption style=\&quot;text-align:center; font-size:0.85rem;color:#64748b;margin-top:.4rem;\&quot;&gt;My Tailscale homepage&lt;/figcaption&gt;\n&lt;/figure&gt;\n\n## What is Tailscale? {#tailscale-intro}\n\nTailscale is a zero-config VPN that creates a secure network between your computers, servers, and cloud instances — even when separated by firewalls and subnets. It&#39;s built on top of WireGuard®, which means you get the speed and security of a modern VPN protocol without the setup complexity.\n\nFor me, it meant I could finally connect all my devices, including my Raspberry Pi and a few cloud VMs from DigitalOcean, into a single, private \&quot;tailnet\&quot;.\n\n## Getting Started with Tailscale\n\nGetting started with Tailscale was mostly straightforward, but I did run into a few configuration hurdles like enabling IP forwarding and disabling Generic Receive Offload (GRO) to get everything working smoothly.\n\nHere&#39;s a breakdown of how I set up my tailnet, which might help you get started as well.\n\n&gt; 12/6/2025: Go read the docs and health check with `tailscale status` getting started is not that hard as you think\n\n### 1. Installing Tailscale\n\nThe first step is to install Tailscale on all the devices you want to connect. Tailscale has clients for almost every operating system.\n\n1.  **Go to the Tailscale download page:** [tailscale.com/download](https://tailscale.com/download)\n2.  **Download and install the client** for your OS (Linux, Windows, macOS, Android, iOS, etc.).\n3.  **Log in:** After installation, you&#39;ll be prompted to log in with a Google, Microsoft, or GitHub account. Use the same account on all your devices to add them to the same tailnet.\n\nFor my Raspberry Pi, I used the command line to install it:\n\n```bash\ncurl -fsSL https://tailscale.com/install.sh | sh\n```\n\n### 2. Advertising a Subnet (like a home network)\n\nOne of the most powerful features of Tailscale is the ability to use a device as a gateway to a whole subnet. This is what I did with my Raspberry Pi to access my home network from anywhere.\n\n1.  **Enable IP forwarding on the gateway device (e.g., your Raspberry Pi).**\n    *   On Linux, you can do this by running:\n        ```bash\n        echo &#39;net.ipv4.ip_forward = 1&#39; | sudo tee -a /etc/sysctl.d/99-tailscale.conf\n        echo &#39;net.ipv6.conf.all.forwarding = 1&#39; | sudo tee -a /etc/sysctl.d/99-tailscale.conf\n        sudo sysctl -p /etc/sysctl.d/99-tailscale.conf\n        ```\n\n2.  **Advertise the subnet route.**\n    *   First, connect your device to your tailnet by running `sudo tailscale up`.\n    *   Then, use the `tailscale set` command to advertise the route. You&#39;ll need to know the IP range of your local network (e.g., `192.168.1.0/24`).\n        ```bash\n        sudo tailscale set --advertise-routes=192.168.1.0/24\n        ```\n\n3.  **Approve the routes in the Tailscale admin console.**\n    *   Go to the [Tailscale admin console](https://login.tailscale.com/admin/machines).\n    *   You will see your device with a \&quot;Subnet routes\&quot; badge. Click on it and approve the advertised routes.\n\n### 3. Using an Exit Node\n\nAn exit node allows you to route all your internet traffic through another device on your tailnet. This is useful for securing your traffic on public Wi-Fi or accessing geo-restricted content. I set up one of my DigitalOcean VMs as an exit node.\n\n1.  **Advertise a device as an exit node.**\n    *   On the device you want to be the exit node, run:\n        ```bash\n        sudo tailscale set --advertise-exit-node\n        ```\n\n2.  **Approve the exit node in the admin console.**\n    *   Go to the admin console, find the machine, and approve it as an exit node.\n\n3.  **Use the exit node from another device.**\n    *   On any other device in your tailnet, you can now choose to route your traffic through the exit node. You can enable this from the Tailscale client menu.\n\n## Conclusion\n\nWith Tailscale, I now have a secure, private network that connects my Raspberry Pi, my laptops, my phone, and my cloud servers. It&#39;s been a game-changer for accessing my devices and services from anywhere in the world. If you&#39;re looking for a simple and powerful way to create your own private network, I highly recommend giving Tailscale a try.\n\n\n## Appended on 12/6/2025\n\nThis is roughly about 2 month later I fully experienced tailscale. What a masterpiece. \nI have spinned up several VMs and running many docker containers. First amazing thing is, tailscale\nserve, no manually enter ip / machine address and ports any more. So good for self hosting. Second is\nsecure connect, It can securly connect 2 computers, without relays if possible, offering low latency and \nstablity. My friend in Spain, running a minecraft server on his side, and I can join his world with the magic\nof tailscale. Excellent game experience and convenience. One notable replacement for this is e4mc mod for minecraft,\nhowever it requires install mods and goes through relays.&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2025-10-26-recent&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Midterm - Photo Dump&quot;],&quot;date&quot;:[3,&quot;2025-10-26T00:00:00.000Z&quot;],&quot;image&quot;:[0,&quot;/assets/2025-10-26-resources/MountainTop.jpg&quot;],&quot;categories&quot;:[1,[[0,&quot;Trash&quot;]]],&quot;authors&quot;:[1,[[0,&quot;Zihao Fu&quot;]]],&quot;tags&quot;:[1,[[0,&quot;others&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;Some photos during midterm.\n\n&gt; &lt;iframe data-testid=\&quot;embed-iframe\&quot; style=\&quot;border-radius:12px\&quot; src=\&quot;https://open.spotify.com/embed/track/3oGVx9RBmiYGv5ZCecWLkx?utm_source=generator\&quot; width=\&quot;100%\&quot; height=\&quot;200\&quot; frameBorder=\&quot;0\&quot; allowfullscreen=\&quot;\&quot; allow=\&quot;autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture\&quot; loading=\&quot;lazy\&quot;&gt;&lt;/iframe&gt;  \n\n&lt;figure&gt;\n&lt;img src=\&quot;/assets/2025-10-26-resources/BeefWok.jpg\&quot; alt=\&quot;Thai food\&quot; style=\&quot;width:100%;max-width:880px;display:block;margin:0 auto;\&quot; /&gt;\n&lt;figcaption style=\&quot;text-align:center; font-size:0.85rem;color:#64748b;margin-top:.4rem;\&quot;&gt;Thai food&lt;/figcaption&gt;\n&lt;/figure&gt;\n\n&lt;figure&gt;\n&lt;img src=\&quot;/assets/2025-10-26-resources/MountainTop.jpg\&quot; alt=\&quot;Mountain Top\&quot; style=\&quot;width:100%;max-width:880px;display:block;margin:0 auto;\&quot; /&gt;\n&lt;figcaption style=\&quot;text-align:center; font-size:0.85rem;color:#64748b;margin-top:.4rem;\&quot;&gt;View of HK&lt;/figcaption&gt;\n&lt;/figure&gt;\n\nThis was actually my **second time** here — the last time was about **a year ago**.\n\n&lt;figure&gt;\n&lt;img src=\&quot;/assets/2025-10-26-resources/lastyearpeek.jpeg\&quot; alt=\&quot;Last year view\&quot; style=\&quot;width:100%;max-width:880px;display:block;margin:0 auto;\&quot; /&gt;\n&lt;figcaption style=\&quot;text-align:center; font-size:0.85rem;color:#64748b;margin-top:.4rem;\&quot;&gt;Picture from last year, same place&lt;/figcaption&gt;\n&lt;/figure&gt;\n\n&lt;figure&gt;\n&lt;img src=\&quot;/assets/2025-10-26-resources/MorningFromCommonRoom.jpg\&quot; alt=\&quot;Common room morning\&quot; style=\&quot;width:100%;max-width:880px;display:block;margin:0 auto;\&quot; /&gt;\n&lt;figcaption style=\&quot;text-align:center; font-size:0.85rem;color:#64748b;margin-top:.4rem;\&quot;&gt;View from the common room that morning&lt;/figcaption&gt;\n&lt;/figure&gt;\n\n&lt;figure&gt;\n&lt;img src=\&quot;/assets/2025-10-26-resources/haidilao.jpg\&quot; alt=\&quot;Hotpot beef\&quot; style=\&quot;width:100%;max-width:880px;display:block;margin:0 auto;\&quot; /&gt;\n&lt;figcaption style=\&quot;text-align:center; font-size:0.85rem;color:#64748b;margin-top:.4rem;\&quot;&gt;Hotpot beef tower&lt;/figcaption&gt;\n&lt;/figure&gt;\n\n## Projects\n\nI’ve upgraded my **Raspberry Pi** with a **512GB SSD**, and now it’s running **Nextcloud** — my very own **private cloud service over Tailscale (Tailnet)**.  \n\n&lt;figure&gt;\n&lt;img src=\&quot;/assets/2025-10-26-resources/RaspberryPiNVMe.jpg\&quot; alt=\&quot;Pi server\&quot; style=\&quot;width:100%;max-width:880px;display:block;margin:0 auto;\&quot; /&gt;\n&lt;figcaption style=\&quot;text-align:center; font-size:0.85rem;color:#64748b;margin-top:.4rem;\&quot;&gt;Raspberry Pi with a 512GB NVMe SSD&lt;/figcaption&gt;\n&lt;/figure&gt;&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2025-11-28-infrastructure&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Building My Self-Hosted Digital Ecosystem :)&quot;],&quot;date&quot;:[3,&quot;2025-11-28T00:00:00.000Z&quot;],&quot;image&quot;:[0,&quot;https://images.alphacoders.com/100/thumb-1920-1003903.jpg&quot;],&quot;categories&quot;:[1,[[0,&quot;Trash&quot;]]],&quot;authors&quot;:[1,[[0,&quot;Zihao Fu&quot;]]],&quot;tags&quot;:[1,[[0,&quot;others&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;# ← November Engineering Retrospective\n\n&gt; I made significant progress through the past month. A multi-regional tailnet\n&gt; has been built out successfully, and I finally understood the Tailscale ACL policy\n&gt; and hardened it. Found a critical security vulnerability on my Paris node:\n&gt; Docker containers bypassed UFW and exposed my Pi-hole as a public resolver.\n\n&gt; &lt;iframe data-testid=\&quot;embed-iframe\&quot; style=\&quot;border-radius:12px\&quot; src=\&quot;https://open.spotify.com/embed/track/1BncfTJAWxrsxyT9culBrj?utm_source=generator\&quot; width=\&quot;100%\&quot; height=\&quot;200\&quot; frameBorder=\&quot;0\&quot; allowfullscreen=\&quot;\&quot; allow=\&quot;autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture\&quot; loading=\&quot;lazy\&quot;&gt;&lt;/iframe&gt;\n&gt; This blog is too difficult for some of my readers, as it has a huge gap from last blog. If you don&#39;t know what is\n&gt; tailscale, [Check this out](/blog/2025-10-09-tailscale#tailscale-intro)\n\n- [**Tailnet**](#tailnet)\n- [**Container bypassed ufw**](#container-bypassed-ufw)\n- [**What do I host in my tailnet?**](#what-do-i-host-in-my-tailnet)\n- [**Minecraft server self hosting**](#minecraft-server-self-hosting)\n- [**Review on proxy solutions**](#setting-up-my-own-proxies)\n- [**Set up shadowsocks**](#shadowsocks)\n- [**Ending**](#at-last)\n\n## Tailnet {#tailnet}\n\n**Tailscale** is one of the best choices to build a secure mesh network, connecting all\ndevices together. **Access Control** is a central topic if we are to manage many devices and users.\nOn this year&#39;s Black Friday, I bought a VPS at **Hostinger** with 4GB of RAM, then I decided to run\nit as a **Minecraft** server, and play with my friends. Now I finally have to face **Access Control** in\nmy tailnet. I don&#39;t want to expose my server on public internet, so **Tailscale** is the best choice,\nand also I don&#39;t want any of my friends hacking around devices in it. Thus, I am changing my **ACL**.\n\nWhat my ACL looked like before:\n\n```json\n{\n  \&quot;src\&quot;: [\&quot;*\&quot;],\n\n  \&quot;dst\&quot;: [\&quot;*\&quot;],\n\n  \&quot;ip\&quot;: [\&quot;*\&quot;]\n}\n```\n\nwhich essentially grants everyone access to any devices. This works perfectly fine with a small\nnumber of users. But, I can imagine my friends posing thousands of pings to my computer just for fun.\nThat is not acceptable, I changed my ACL to something like:\n\n```json\n{\n  \&quot;src\&quot;: [\&quot;autogroup:members\&quot;],\n\n  \&quot;dst\&quot;: [\n    \&quot;tag:gpt\&quot;,\n    \&quot;tag:hkust\&quot;,\n    \&quot;tag:relays\&quot;,\n    \&quot;tag:server\&quot;,\n    \&quot;tag:service-member\&quot;,\n    \&quot;autogroup:internet\&quot;\n  ],\n\n  \&quot;ip\&quot;: [\&quot;*\&quot;]\n}\n```\n\nThis version seems to work but I tried it and got stuck on it. This was given by an LLM. I should never trust it\nin the first place. What this means is granting all members access to devices with some tags, and use of exit-node.\nThe problem is Tailscale ACL is deny on default, I am the owner of the tailnet, owner is a member, but without\nexplicitly allowing owner to access, an owner or in this case admins are not granted with access.\nWith final fine tuning, I get:\n\n```json\n{\n  \&quot;grants\&quot;: [\n    {\n      // All members can use peer relays (tag:relays)\n      // as Tailscale Peer Relays\n      \&quot;src\&quot;: [\&quot;autogroup:members\&quot;],\n\n      \&quot;dst\&quot;: [\&quot;tag:relays\&quot;],\n      \&quot;app\&quot;: { \&quot;tailscale.com/cap/relay\&quot;: [] }\n    },\n    // Members\n    {\n      \&quot;src\&quot;: [\&quot;*\&quot;],\n\n      \&quot;dst\&quot;: [\n        \&quot;tag:gpt\&quot;,\n        \&quot;tag:hkust\&quot;,\n        \&quot;tag:relays\&quot;,\n        \&quot;tag:server\&quot;,\n        \&quot;tag:service-member\&quot;,\n        \&quot;autogroup:internet\&quot;\n      ],\n\n      \&quot;ip\&quot;: [\&quot;*\&quot;]\n    },\n    // Admins\n    {\n      \&quot;src\&quot;: [\n        \&quot;autogroup:admin\&quot;,\n        \&quot;autogroup:it-admin\&quot;,\n        \&quot;autogroup:network-admin\&quot;,\n        \&quot;autogroup:billing-admin\&quot;,\n        \&quot;autogroup:auditor\&quot;\n      ],\n\n      \&quot;dst\&quot;: [\n        \&quot;autogroup:members\&quot;,\n        \&quot;autogroup:internet\&quot;,\n        \&quot;autogroup:self\&quot;,\n        \&quot;tag:service-admin\&quot;\n      ],\n\n      \&quot;ip\&quot;: [\&quot;*\&quot;]\n    },\n    // Owner\n    {\n      \&quot;src\&quot;: [\&quot;autogroup:owner\&quot;],\n      \&quot;dst\&quot;: [\&quot;*\&quot;],\n      \&quot;ip\&quot;: [\&quot;*\&quot;]\n    },\n    {\n      \&quot;src\&quot;: [\&quot;autogroup:tagged\&quot;],\n\n      \&quot;dst\&quot;: [\n        \&quot;tag:service-member\&quot;,\n        \&quot;tag:gpt\&quot;,\n        \&quot;tag:hkust\&quot;,\n        \&quot;tag:relays\&quot;,\n        \&quot;tag:server\&quot;\n      ],\n\n      \&quot;ip\&quot;: [\&quot;*\&quot;]\n    }\n  ]\n}\n```\n\nExplicit and strict.\n\n## Container bypassed ufw {#container-bypassed-ufw}\n\n**Docker** containers are a level above **UFW**, which means **UFW** cannot block public requests to my **Pi-hole** container.\n\n```txt\nExternal Client\n     |\n     |  DNS query UDP/TCP 53\n     v\n+----------------+\n| Host Public IP |\n+----------------+\n        |\n        v\n+-------------------------------+\n| Debian VPS / Linux Kernel     |\n+-------------------------------+\n        |\n        | forwarded into Docker NAT path\n        v\n+-------------------------------+\n| Docker iptables / DNAT        |\n| -&gt; 172.18.0.x:53              |\n+-------------------------------+\n        |\n        v\n+-------------------------------+\n| Pi-hole container             |\n| listens on port 53            |\n+-------------------------------+\n        |\n        | DNS reply\n        v\nExternal Client\n\n[ UFW default deny exists on host input side, but this traffic is\n  illustrated as reaching Docker&#39;s NAT path instead of stopping there ]\n```\n\nThis made my **Pi-hole** a public container, once I went to check the admin panel of my **Pi-hole**,\nthere are about 1700 active clients using my resolver. Lots of them are from Brazil.\n\n&lt;figure&gt;\n &lt;img src=\&quot;/assets/2025-11-28-resources/publicResolver.png\&quot; alt=\&quot;Public resolver\&quot; style=\&quot;width:100%;max-width:880px;display:block;margin:0 auto;\&quot; /&gt;\n &lt;figcaption style=\&quot;text-align:center; font-size:0.85rem;color:#64748b;margin-top:.4rem;\&quot;&gt;Pi-hole is being used as a public resolver, I&#39;m pissed&lt;/figcaption&gt;\n&lt;/figure&gt;\n\n**How did I solve it?**\nI used a firewall, not **UFW**. The firewall provided by **Hostinger**, it is at a bigger scope and drops requests from the outside world.\n\n## What do I host in my tailnet? {#what-do-i-host-in-my-tailnet}\n\nSelf-hosting is so much fun. And you hold your own data.\n\n1. [**Pi-hole**](https://pi-hole.net/) A super lightweight DNS resolver, block ads in the tailnet. Takes about\n   30Mb with container.\n2. [**Karakeep**](https://karakeep.app/) Bookmark everything, with AI scraping support. Most platforms support it.\n3. [**Uptime-Kuma**](https://uptime.kuma.pet/) Fancy monitoring tool for self hosting. Notify you if your service is down.\n4. [**SearXNG**](https://docs.searxng.org/) A privacy first search engine. I use it along the [**Min Browser**](https://github.com/minbrowser/min), Min browser has a built-in support of SOCK5 protocol, which is perfect.\n5. Minecraft server self hosting, [**Read more**](#minecraft-server-self-hosting)\n6. Proxy server self hosting, [**Read more**](#setting-up-my-own-proxies)\n7. [**Nextcloud**](https://nextcloud.com/)\n\n## Minecraft server self hosting {#minecraft-server-self-hosting}\n\nI am using a **Minecraft** server container to help me easily set up the server.\n[**Source**](https://github.com/itzg/docker-minecraft-server)\n\n&gt; I have not dived into the server configuration yet. I just set it up and today is Friday, I am going to test it out with my friend during weekends. Hope the server will survive under 2GB Ram.\n\nThe above solution requires more RAM and performance. The server is in **Java**, I suspect its efficiency. Yesterday, I found a community **Minecraft** server, [**source**](https://github.com/ZihaoFU245/cuberite). The link is the repo that I forked, I added **Docker** support for it, save you more time. The drawback is that it only supports old versions of **Minecraft**, 1.12.\\*.\n\n1. `docker build -t cuberite .` Build the image\n2. `docker run -d -p 25565:25565 -p 8080:8080 -v ./cuberite-data:/server --name cuberite cuberite` Run the container. The server is at port 25565 and admin panel at 8080. Modify `webadmin.ini` file to create an admin account and restart the container.\n\n### Minimalist\n\n[**Minimal MC server**](https://github.com/ZihaoFU245/mcserver),\nI wrote a Dockerfile along with a start shell script. Place your **downloaded server.jar** under that directory and build the images, and you will have a running mc server!\n\n## Setting up my own proxies {#setting-up-my-own-proxies}\n\n**Geo Block** is one of the most annoying things in the world. How to solve it? Use a proxy. Buy your own VPS and self host a proxy server can actually have many benefits:\n\n1. You manage the server, data is in your hands\n2. No one is competing with you, get the whole bandwidth\n3. Can be cheaper than buying a proxy provider\n4. Secure browsing under unsafe networks\n\nThrough the last few months, I&#39;ve been researching on proxies and VPNs. The most straightforward choice is **WireGuard**.\n\n&gt; WireGuard® is an extremely simple yet fast and modern VPN that utilizes state-of-the-art cryptography.\n\n&gt; \&quot;Can I just once again state my love for it and hope it gets merged soon? Maybe the code isn&#39;t perfect, but I&#39;ve skimmed it, and compared to the horrors that are OpenVPN and IPsec, it&#39;s a work of art.\&quot; Linus\n\nI would say the best way to use it is through [**Tailscale**](https://tailscale.com/), fast, lightweight and most importantly, a mesh! This entire blog could not be done without Tailscale.\n\n### But at what cost? Typical BBC ending\n\n**WireGuard**&#39;s aim is simplicity and speed. It can be easily fingerprinted, under some firewall circumstances, it will be blocked or unstable.\n\nI then went on further, deeper research. Later I found another tool: [**AmneziaWG**](https://github.com/amnezia-vpn), can avoid **DPI** inspection, while retaining the speed of **WireGuard**. But the installation is a little complicated on a self-hosted **Linux** machine, which I modified a script, [**Source**](https://github.com/ZihaoFU245/amneziawg-install), a fork from [Varkin&#39;s script](https://github.com/Varckin/amneziawg-install). In 2025, the apt source list of **Amnezia**, I haven&#39;t dived into that. But the installation script would fail for newer **Linux** kernel. (You can find it in the issues) That&#39;s the motivation for modifying the script. It does not involve kernel modules, all lives under userspace. It builds the official go source code and installs it. Again, make life easier.\n\n### What I also tried\n\nI also tried **V2Ray**, **Hysteria** and **Shadowsocks**.\n**V2Ray** and **Hysteria** seems to have many active users, but the setting up is rather complicated, or like **Hysteria**, very hard to find cross platform client GUI binaries.\nI want to mention as well, all of them cannot achieve the speed as **WireGuard** and **AmneziaWG**.\n\nAmong them, I recommend **Shadowsocks** first. It has well maintained client applications for **Android**, **Windows**, **Apple** ecosystem. [**Source**](https://github.com/shadowsocks/shadowsocks-rust) **Shadowsocks** rust is safe and very memory efficient.\n\n```bash\nzihao@paris:~$ systemctl status shadowsocks\n● shadowsocks.service - Shadowsocks-Rust Server\n     Loaded: loaded (/etc/systemd/system/shadowsocks.service; enabled; preset: enabled)\n     Active: active (running) since Tue 2025-11-25 06:57:32 UTC; 3 days ago\n Invocation: c940ef97e54b45afb70755d7f219116b\n   Main PID: 411417 (ssserver)\n      Tasks: 3 (limit: 4647)\n     Memory: 3.5M (peak: 5.3M)\n        CPU: 795ms\n     CGroup: /system.slice/shadowsocks.service\n             └─411417 /usr/bin/ssserver -c /etc/shadowsocks/config.json\n```\n\nSee the **Shadowsocks** server in **Rust**, is a memory saver. When running a wifi speed test on my device, the memory would only increase to around 10Mb.\n\n### How to set it up? {#shadowsocks}\n\n1. Clone the repo, and run `cargo build --release`, use native build flag if possible, it can achieve better performance in crypto.\n2. In `./target/release` you can find the `ssserver` binary, move this to your VPS. If you build it directly on your VPS ignore this.\n3. In `/etc/systemd/system/` create a service, like this:\n\n```bash\nzihao@paris:/etc/systemd/system$ cat shadowsocks.service\n[Unit]\nDescription=Shadowsocks-Rust Server\nAfter=network-online.target\nWants=network-online.target\n\n[Service]\nType=simple\nUser=nobody\nGroup=nogroup\nExecStart=/usr/bin/ssserver -c /etc/shadowsocks/config.json\nRestart=on-failure\nRestartSec=3\nLimitNOFILE=51200\n\n[Install]\nWantedBy=multi-user.target\n```\n\nStep 4. Then make a directory `/etc/shadowsocks/` create a `config.json` file, like this:\n\n```bash\nzihao@paris:~$ cat /etc/shadowsocks/config.json\n{\n  \&quot;server\&quot;: \&quot;0.0.0.0\&quot;,\n  \&quot;server_port\&quot;: { Port you want to use },\n  \&quot;password\&quot;: \&quot;{ strong password }\&quot;,\n  \&quot;method\&quot;: \&quot;chacha20-ietf-poly1305\&quot;\n}\n```\n\nRecommend use `openssl rand -base64 30` to generate a strong password\n\nStep 5. Start the service, with:\n\n```bash\n# Start the service\nsudo systemctl enable --now shadowsocks\nsudo systemctl start shadowsocks\n\n# Health check\nsudo systemctl status shadowsocks\nsudo journalctl -u shadowsocks\n```\n\nStep 6. Configure on your client side. You may find the client app in shadowsocks repo.\n\n## At Last {#at-last}\n\nI learned a lot during November. Also learned a lot this term. Nov 28, Friday should be the last of the fall term. I&#39;m writing this up to conclude my fall term at 2025.\n\n- I know how to use **Linux**\n- Learned how to use **Tailscale**\n- Learned many infrastructure set up experience\n- Learning **Rust** right now\n\nWhat I also enjoyed:\n\n- Stranger Things\n- Wednesday\n- La casa de papel\n- La casa de papel: Berlin\n- Designated Survivor\n\nMaybe I should write a review blog about all these shows.\nI should remove these AI driven blog posts(: Those are in such low quality.\n\n&gt; I got a new domain zihaofu245.cloud, don&#39;t know what to serve yet. Open for ideas.\n\n&gt; This blog is all written by me, no LLM involved.&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2025-12-19-end-of-beginning&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;End of beginning&quot;],&quot;date&quot;:[3,&quot;2025-12-19T00:00:00.000Z&quot;],&quot;image&quot;:[0,&quot;/assets/2025-12-19-resources/teaser.jpg&quot;],&quot;categories&quot;:[1,[[0,&quot;Trash&quot;]]],&quot;authors&quot;:[1,[[0,&quot;Zihao Fu&quot;]]],&quot;tags&quot;:[1,[[0,&quot;others&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;&gt; &lt;iframe data-testid=\&quot;embed-iframe\&quot; style=\&quot;border-radius:12px\&quot; src=\&quot;https://open.spotify.com/embed/track/3qhlB30KknSejmIvZZLjOD?utm_source=generator\&quot; width=\&quot;100%\&quot; height=\&quot;200\&quot; frameBorder=\&quot;0\&quot; allowfullscreen=\&quot;\&quot; allow=\&quot;autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture\&quot; loading=\&quot;lazy\&quot;&gt;&lt;/iframe&gt;\n&gt; A song I recently like\n\n## Every Action comes with an consequence\n\nAfter I decided to live in the moment back in September, the consequences came quickly.\nDecember has arrived, would\nthere be a miracle in the rest 11 days to save me from reality?\n\nBack to todays topic, end of beginning. Why do I choose this header?\n\n1. December is my birthday month, and I turned 19, which I realized my joyful childhood\nhas came to an end. End of 18 years of child life, what waiting for me is the next 10 years of new era.\nI little bit sad.\n\n2. From 2025 spring term, I tried so hard to improve my GPA. And after all that\nhard works, I improved **0.01**. So I wondered, what is the necessity of studying so hard?\nTo fulfil my ego? Thus this term I decided to live the moment, and consequences came.\nI have an answer now, to make me feel good, get a below median do hurts. End of my\nexperiment of living the moment. **Reserve a seat for myself in library.**\n\n3. I am watching \&quot;Dark\&quot;, that famous show. It really inspired me of thinking about time,\nand Causality. The \&quot;dark world\&quot; is really fascinating, a circled timeline. Past effects future,\nand future effects past, like past and future are if and only if relationships. When is end?\nWhen is beginning? End of beginning should be end **and** beginning.\n\n&lt;figure style=\&quot;text-align:center;\&quot;&gt;\n  &lt;img src=\&quot;/assets/2025-12-19-resources/whiskey.jpg\&quot; alt=\&quot;Thai food\&quot; style=\&quot;width:50%;max-width:440px;display:block;margin:0 auto;\&quot; /&gt;\n&lt;/figure&gt;\n&lt;div style=\&quot;text-align:center; font-size:0.85rem;color:#64748b;margin-top:.4rem;\&quot;&gt;Bar at coast&lt;/div&gt;\n\nThis term, I did not take too much photos. It feels like September and October slipped away\nin a sudden, while November are surprisingly slow.\n\n## What I&#39;ve been doing\n\n### My first PR contribute to public repo\n\nI am making docker container support for [cuberite](https://github.com/cuberite/cuberite/pull/5621),\na community version of minecraft server. The server only supports up to 1.14 version of minecraft,\nit is a major drawback. But in contrast to official server, it is written in C++, giving high performance\ncomparing to java server. It can run easily on a raspberry pi. This server is missing container shipping,\ntherefore I am writing one.\n\n&gt; An annoying thing is the CI, MSVC build failed, but clang and g++ on ubuntu has no problem.\n\n### Netcat implemented in Golang\n\nI am new to golang, it is used widely in network scenarios, concurrency has made go unique.\nThere are people already implemented netcat in golang, mine is for learning go. Here is the repo,\n[netcat-go](https://github.com/ZihaoFU245/netcat-go). Some basic features are ready to use, while\nsome fancy ones, like hexdump, file sharing, is not yet ready.\n\nNetcat `-e` flag in history is considered as a backdoor, which can act like a reverse shell.\n`nc &lt;dest ip&gt; &lt;port&gt; -e /bin/bash`, this can act like a backdoor. 50 lines of code can make your\ndevice insecure.\n\n### Remotely playing PS5\n\nI am thinking of a way to remotely playing PS5 in low latency. The official PS remote app\nis dummy, even under a VPN which is Layer 3, it can not find PS5 machine, and traffic will be routed\nthrough Sony&#39;s server giving higher latency and introduce instability. If PS5 is directly exposed\nin public internet, then it will be direct, but under most cases, it is behind a NAT.\n\nI will be setting up PS5 in my madrid house, and use chiaki, a community PS remote application,\nwhich support a direct ip connection. I can utilize my tailnet, to give a direct connection.\n\nInspired by this, I have bought a HDMI video capture card. Combined with a remote IR control\n\n## What I gonna do in winter holiday\n\n### Home Lab Set up\n\nI will be setting up my own home lab in Madrid. A usual home lab, you could possibly think of,\nrequire powerful CPUs or 4090s. Mine is much shallower, a raspberry pi. I small raspberry pi\nwith a public ipv4 can be way powerful then you think. Set up services that only used by few people,\nVPNs, remote control, minecraft server (I would use an old thinkbook laptop more likely), etc.\n\n### Switch to Linux (Ubuntu)\n\nI am quite tired of using windows. Windows file systems, services, powershell, cmd, etc, are\nnot as easy as Unix I personally believe. With the power of Wine and Proton, developed by valve,\nI can play my games on Linux as well.\n\n### Traveling\n\nDec 22th to 25th, I will be Nice, France. Jan 1th to 8th I will go to Denmark and Norway, mainly go\nto watch northern lights. By that time, I will have posted a travel blog contained my best photos.\n\n---\n\n&gt; I do feel this term one reason I didn&#39;t get good grades is because I focus on too much on my\npersonal hobbies\n\n&gt; I have decided to separate technical blogs with general chitchat blogs, with better focus.&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2026-04-04-acap&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;How to set up a personal AC+AP style network?&quot;],&quot;date&quot;:[3,&quot;2026-04-01T00:00:00.000Z&quot;],&quot;image&quot;:[0,&quot;/assets/2026-04-04-resources/3.jpeg&quot;],&quot;categories&quot;:[1,[[0,&quot;Tech&quot;]]],&quot;authors&quot;:[1,[[0,&quot;Zihao Fu&quot;]]],&quot;tags&quot;:[1,[[0,&quot;others&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;Shown above is a **GL.iNet mt3600be** router, used in this blog post for **demonstration**. It uses an OpenWrt-\nbased system, providing excellent flexibility. It will be used as a powerful **MLO (Wi-Fi 7) Access Point**.\n\n&lt;figure style=\&quot;text-align:center;\&quot;&gt;\n  &lt;img src=\&quot;/assets/2026-04-04-resources/1.jpeg\&quot; alt=\&quot;mt3600be\&quot; style=\&quot;width:50%;max-width:440px;display:block;margin:0 auto;\&quot; /&gt;\n&lt;/figure&gt;\n\nAs you can see, this is a **CN** version of a GL.iNet router. Features including VPN and AdGuard Home\nare **blocked** (hidden). For Wi-Fi 7 MLO, 6 GHz bandwidth may also be limited. To achieve the best experience,\nyou can unlock it by replacing the country code in the **factory image**[^1]. For the **global version**,\nyou already have most features available.\n\n## Table of Contents\n\n## What is an AC+AP style network?\n\nAn **AC+AP network** is composed of a central **Access Controller** and one or more **Access Points**.\nIt is widely used in enterprise environments for large Wi-Fi coverage and fast roaming. **Campus Wi-Fi** is a\nclassic example of an AC+AP style network. It can cover an entire campus, and users normally\ncannot feel the latency when a device switches APs. **AC+AP** architecture utilizes 802.11k/v/r\nstandards to achieve seamless AP transitions, which is a key advantage.\n\n&lt;figure style=\&quot;text-align:center;\&quot;&gt;\n  &lt;img src=\&quot;/assets/2026-04-04-resources/8.jpeg\&quot; alt=\&quot;Final\&quot; style=\&quot;width:80%;max-width:540px;display:block;margin:0 auto;\&quot; /&gt;\n&lt;/figure&gt;\n&lt;div style=\&quot;text-align:center; font-size:0.85rem;color:#64748b;margin-top:.4rem;\&quot;&gt;Final setup&lt;/div&gt;\n\nThe image above is an illustration of the finished setup. The **Raspberry Pi 5** on the left is my **AC**\nand **gateway**. The **mt3600be** on the right is used as a **wireless access point**, supporting Wi-Fi 7. The Wi-Fi card,\n**mt7925**, on top of the Pi is a secondary **AP** that I built in [this post](/blog/2026-3-05-pi-router). This post can be seen as an extension of that earlier blog on how to DIY your own router.\n\n### Components of AC+AP network\n\n- **AC**: a central controller that manages one or more APs. In this setup, the Raspberry Pi also acts as the router/gateway. \n- **AP**: Wireless access point. **mt3600be** and **mt7925** are used.\n- **PoE Switch**: Optional. Use an Ethernet cable for power and data for a simpler setup. The switch ensures all AC and AP devices are in one subnet.\n- **Main router**: Used to access WAN. A Raspberry Pi is used.\n\n## Difference to mesh architecture?\n\nAn **AC+AP (Access Controller + Access Points)** network is a centralized\nWi-Fi architecture where multiple APs are managed by a single controller that handles\nconfiguration, channel planning, and roaming, typically with all APs connected via wired Ethernet\ncable. In contrast, a **mesh network** is distributed: each node acts as both an AP and a relay,\nforwarding traffic over wireless links to other nodes without requiring a central controller. The key\ndifference is therefore **centralized control with wired connection (AC+AP)** versus\n**distributed forwarding with wireless connection (mesh)**. As a result, AC+AP systems usually provide\nmore stable performance and\npredictable latency, while mesh networks offer **easier deployment** but can suffer reduced throughput\ndue to multi-hop wireless links.\n\n**AC+AP** is designed to **scale larger**, targeted for enterprise scenarios, while mesh is targeted for\n**smaller/home** networks.\n\n&lt;figure style=\&quot;text-align:center;\&quot;&gt;\n  &lt;img src=\&quot;/assets/2026-04-04-resources/2.jpeg\&quot; alt=\&quot;Final\&quot; style=\&quot;width:80%;max-width:540px;display:block;margin:0 auto;\&quot; /&gt;\n&lt;/figure&gt;\n&lt;div style=\&quot;text-align:center; font-size:0.85rem;color:#64748b;margin-top:.4rem;\&quot;&gt;\nI have 2 OpenWrt routers. In this image, I set both of them as &lt;b&gt;Access Points&lt;/b&gt;,\nall connected via physical Ethernet cable. This is an AC+AP style network.\n&lt;/div&gt;\n\n## Access Controller &amp; Main Router configuration\n\nNow let&#39;s dive into configuration. On OpenWrt, when you inspect interfaces,\nyou can find one called `br-lan`; it is a virtual switch. On the AC (Raspberry Pi), you need\na virtual switch as well, to put multiple network interfaces into one LAN.\n\n```bash\n2: eth0: &lt;BROADCAST,MULTICAST,UP,LOWER_UP&gt; mtu 1500 qdisc fq_codel state UP group default qlen 1000\n    link/ether 2c:cf:67:f5:96:bd brd ff:ff:ff:ff:ff:ff\n    inet 143.89.92.189/23 brd 143.89.93.255 scope global dynamic noprefixroute eth0\n       valid_lft 322039sec preferred_lft 322039sec\n    inet6 fe80::2ecf:67ff:fef5:96bd/64 scope link noprefixroute \n       valid_lft forever preferred_lft forever\n3: eth1: &lt;BROADCAST,MULTICAST,UP,LOWER_UP&gt; mtu 1500 qdisc fq_codel master br0 state UP group default qlen 1000\n    link/ether 9c:69:d3:75:af:fe brd ff:ff:ff:ff:ff:ff\n    inet6 fe80::9e69:d3ff:fe75:affe/64 scope link proto kernel_ll \n       valid_lft forever preferred_lft forever\n5: wlan1: &lt;BROADCAST,MULTICAST,UP,LOWER_UP&gt; mtu 1500 qdisc noqueue master br0 state UP group default qlen 1000\n    link/ether 84:9e:56:9c:71:a5 brd ff:ff:ff:ff:ff:ff\n    inet6 fe80::869e:56ff:fe9c:71a5/64 scope link proto kernel_ll \n       valid_lft forever preferred_lft forever\n6: br0: &lt;BROADCAST,MULTICAST,UP,LOWER_UP&gt; mtu 1500 qdisc noqueue state UP group default qlen 1000\n    link/ether 84:9e:56:9c:71:a5 brd ff:ff:ff:ff:ff:ff\n    inet 192.168.205.1/24 scope global br0\n       valid_lft forever preferred_lft forever\n```\n\nAbove are the network interfaces used on my AC. `br0` is the virtual switch and holds my network subnet IP\naddress: `192.168.205.1/24`. `wlan1` is the **mt7925** interface and provides a 5 GHz radio. `eth1` is\nmy USB-to-Ethernet adapter, connected externally to my **GL.iNet mt3600be AP**. `eth0` is the WAN interface; all\ntraffic will be **masqueraded** and exit through it.\n\n### Set up bridge on startup\n\nTo maintain a persistent bridge even after reboot, the best approach is to use a systemd service.\nCreate a `/usr/local/sbin/setup-br0.sh` shell script that runs on startup.\n\n```bash\n#!/usr/bin/env bash\nset -euo pipefail\n\nBR=br0\nLAN_IP=192.168.205.1/24\n\n# Create bridge if missing\nif ! ip link show \&quot;$BR\&quot; &gt;/dev/null 2&gt;&amp;1; then\n    ip link add name \&quot;$BR\&quot; type bridge\nfi\n\n# Make sure bridge is up and owns the LAN IP\nip link set dev \&quot;$BR\&quot; up\nip link set dev \&quot;$BR\&quot; type bridge stp_state 0 || true\n\nip addr flush dev \&quot;$BR\&quot; 2&gt;/dev/null || true\nip addr add \&quot;$LAN_IP\&quot; dev \&quot;$BR\&quot;\n\n# Add eth1 only if it exists\n# eth1 is usb ethernet adaptor\nif ip link show eth1 &gt;/dev/null 2&gt;&amp;1; then\n    ip addr flush dev eth1 2&gt;/dev/null || true\n    ip link set dev eth1 nomaster 2&gt;/dev/null || true\n    ip link set dev eth1 master \&quot;$BR\&quot;\n    ip link set dev eth1 up\nfi\n\n# We don&#39;t set wlan1 master to br0 here is because\n# hostapd will do the bridge configuration\n# leave it to hostapd\n```\n\nYou may need to modify the script based on your actual setup. For a Raspberry Pi 5 with a USB Ethernet\nadapter, you can use the script as is.\n\nCreate a systemd unit: `/etc/systemd/system/setup-br0.service`\n\n```toml\n[Unit]\nDescription=Create br0 bridge and attach eth1\nBefore=hostapd.service\nAfter=NetworkManager.service\nRequires=NetworkManager.service\n\n[Service]\nType=oneshot\nExecStart=/usr/local/sbin/setup-br0.sh\nRemainAfterExit=yes\n\n[Install]\nWantedBy=multi-user.target\n```\n\nThen run `sudo systemctl daemon-reload &amp;&amp; sudo systemctl enable setup-br0`; this will make the script\nexecute at startup.\n\nAfter reboot or direct execution of the script, you can verify it with `bridge link show`. All network\ninterfaces that you want to place in the same LAN should share the same master bridge. In my case, as shown\nbelow, wlan1 and eth1 both have master br0.\n\n```bash\n3: eth1: &lt;BROADCAST,MULTICAST,UP,LOWER_UP&gt; mtu 1500 master br0 state forwarding priority 32 cost 5\n5: wlan1: &lt;BROADCAST,MULTICAST,UP,LOWER_UP&gt; mtu 1500 master br0 state forwarding priority 32 cost 100\n```\n\nFor the wlan1 interface, you **don&#39;t manually** assign it to br0. Put that in the hostapd config file,\nand hostapd will configure it for you.\n\n### Configure routing (firewall)\n\nNow that your bridge is configured, it is time to configure routing rules and access controls.\nI use nftables as the firewall, which gives more granular control than ufw or firewall-cmd.\nnftables is the default firewall in modern Linux operating systems, offering better usability\nthan iptables.\n\n```nginx\n#!/usr/sbin/nft -f\n\n# add table ensures the table exists before flush\n# Do not use flush ruleset, scope is too big\n# And will modify iptables-nft rules\nadd table inet filter\nflush table inet filter\n\ntable inet filter {\n    chain input {\n        type filter hook input priority 0; policy drop;\n\n        iifname \&quot;lo\&quot; accept\n        ct state established,related accept\n\n        # DNS / DHCP / UPnP\n        iifname { \&quot;br0\&quot;, \&quot;wlan1\&quot;, \&quot;eth1\&quot; } udp dport { 67, 53 } accept\n        iifname { \&quot;br0\&quot;, \&quot;wlan1\&quot;, \&quot;eth1\&quot; } tcp dport 53 accept\n\n        ip protocol icmp accept\n        ip6 nexthdr ipv6-icmp accept\n    }\n\n    chain forward {\n        type filter hook forward priority 0; policy drop;\n\n        ct state established,related accept\n\n        # Normal routing\n        iifname \&quot;br0\&quot; oifname \&quot;eth0\&quot; accept\n\n        # LAN, change to your subnet\n        ip saddr 192.168.205.0/24 accept\n\n        ip protocol icmp accept\n        ip6 nexthdr ipv6-icmp accept\n    }\n\n    chain output {\n        type filter hook output priority 0; policy accept;\n    }\n\n    # ---------- NAT ----------\n    chain prerouting {\n        type nat hook prerouting priority dstnat; policy accept;\n    }\n\n    chain postrouting {\n        type nat hook postrouting priority srcnat; policy accept;\n        oifname \&quot;eth0\&quot; ip saddr 192.168.205.0/24 masquerade\n    }\n}\n```\n\nAbove is an example of **restricted cone NAT** achieved with nftables[^2],\nthe most common NAT type. If you are using P2P,\nconsider using **miniupnpd**[^3] or change postrouting last line to\n`oifname \&quot;eth0\&quot; ip saddr 192.168.205.0/24 masquerade fully-random, persistent`, change source address\nfield to your LAN address.\n\n---\n\nWhat does an AC+AP router need?\n\n- Routing: Covered, use nftables\n- DHCP / DNS: use dnsmasq[^4]\n- Bridge LAN: Covered, use shell script to manually create and assign\n- Radio: use hostapd or add a router as a dummy access point (covered next).\n\nBefore you continue, you should finish the first 3 steps, or at least part of step 4.\nFor me, I am using **hostapd** on **wlan1**[^5], my MediaTek Wi-Fi card.\n\n## Access Point configuration on OpenWrt\n\n### Generic OpenWrt\n\nOn OpenWrt, to achieve the best roaming speed, 802.11k/v/r standards are required.\nOpenWrt firmware usually bundles **wpad-basic-mbedtls**, which does not include support\nfor these standards. We will need to install **wpad-openssl** for full support.\n\n![wpad-openssl](/assets/2026-04-04-resources/11.png)\n\nOn the latest OpenWrt 25.12 version, use `apk add wpad-openssl` or go to LuCI[^6] and install the package\nin **System-&gt;Software**, search **wpad-openssl**, and install it.\n\nThen go to **Network-&gt;Wireless** and configure radio settings.\n\n![network](/assets/2026-04-04-resources/9.png)\n\nI recommend using interactive configuration instead of UCI because it is easier. On older\nOpenWrt versions, such as 21 on mt3600be, LuCI does not provide a section to edit roaming configuration,\neven though it is supported. In that case, UCI is needed.\n\nLastly, go to Edit radio, configure your Access Point, disable DHCP on `br-lan`, and set `br-lan`\nto a static IP address.\n\n![AP](/assets/2026-04-04-resources/10.png)\n\n### GL.iNet OpenWrt\n\nIn GL.iNet Network mode, you can set OpenWrt to **Access Point**. It will automatically disable\nDHCP and request an IP address from the upstream router via DHCP.\n\n![Network mode GLiNet](/assets/2026-04-04-resources/12.png)\n\nThis does not provide your router with a static IP address.\nWhen accessing the router admin panel remotely, you&#39;ll need to look up the IP address\non the main router. Or use the following:\n\n```bash\nuci set network.lan.ipaddr=&#39;192.168.205.2&#39; # In the same subnet, avoid IP address collision\nuci set network.lan.netmask=&#39;255.255.255.0&#39;\nuci commit network\n/etc/init.d/network restart\n```\n\nTo enable 802.11k/v/r, use the following:\n\n```bash\nuci set wireless.lan.ieee80211r=&#39;1&#39;\nuci set wireless.lan.mobility_domain=&#39;4f57&#39;\nuci set wireless.lan.ft_over_ds=&#39;1&#39;\nuci set wireless.lan.ft_psk_generate_local=&#39;1&#39;\n\nuci set wireless.lan.bss_transition=&#39;1&#39;\n\nuci set wireless.lan.rrm_neighbor_report=&#39;1&#39;\nuci set wireless.lan.rrm_beacon_report=&#39;1&#39;\n\nuci commit wireless\nwifi reload\n```\n\nAfte
