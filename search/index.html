r this, your GL.iNet router will be a powerful access point.\n\n&lt;figure style=\&quot;text-align:center;\&quot;&gt;\n  &lt;img src=\&quot;/assets/2026-04-04-resources/4.jpeg\&quot; alt=\&quot;Final\&quot; style=\&quot;width:50%;max-width:540px;display:block;margin:0 auto;\&quot; /&gt;\n&lt;/figure&gt;\n\n## Useful Tips\n\n1. Use an **Ethernet cable** to connect to your router before configuring, in case you lose access midway.\n2. When configuring the router IP address, your gateway IP address will change, for example from `192.168.8.1`\nto `192.168.205.*`. So your admin panel will not receive a response at the old address; go to the new IP address to\naccess the admin panel.\n\n---\n\nFor the generic OpenWrt demo, I used a **Cudy TR3000** (256 MB version), a Wi-Fi 6 router with an **mt7981** chipset.\nFlashing OpenWrt is very straightforward, and OpenWrt has official support[^7]. This is\na decent OpenWrt starter device.\n\n&lt;figure style=\&quot;text-align:center;\&quot;&gt;\n  &lt;img src=\&quot;/assets/2026-04-04-resources/5.jpeg\&quot; alt=\&quot;Final\&quot; style=\&quot;width:80%;max-width:540px;display:block;margin:0 auto;\&quot; /&gt;\n&lt;/figure&gt;\n&lt;figure style=\&quot;text-align:center;\&quot;&gt;\n  &lt;img src=\&quot;/assets/2026-04-04-resources/6.jpeg\&quot; alt=\&quot;Final\&quot; style=\&quot;width:80%;max-width:540px;display:block;margin:0 auto;\&quot; /&gt;\n&lt;/figure&gt;\n&lt;figure style=\&quot;text-align:center;\&quot;&gt;\n  &lt;img src=\&quot;/assets/2026-04-04-resources/7.jpeg\&quot; alt=\&quot;Final\&quot; style=\&quot;width:80%;max-width:540px;display:block;margin:0 auto;\&quot; /&gt;\n&lt;/figure&gt;&lt;div style=\&quot;text-align:center; font-size:0.85rem;color:#64748b;margin-top:.4rem;\&quot;&gt;\nInternal details\n&lt;/div&gt;\n\n---\n\nREFERENCES:\n\n[^1]: How to find \&quot;CN\&quot; string and replace to \&quot;US\&quot; for GL.iNet mt3600be: https://www.reddit.com/r/GlInet/comments/1qfeva7/guide_region_unlock_glmt3600be_beryl_7_cn_to\n\n[^2]: nftables NAT documentation: https://wiki.nftables.org/wiki-nftables/index.php/Performing_Network_Address_Translation_(NAT)#Masquerading\n\n[^3]: OpenWrt configure upnpd: https://openwrt.org/docs/guide-user/firewall/upnp/miniupnpd\n\n[^4]: Dnsmasq configuration tutorial on Fedora: https://docs.fedoraproject.org/en-US/fedora-server/administration/dnsmasq/\n\n[^5]: Zihao Fu, configuring mt7925 on Raspberry Pi: https://zihaofu245.me/blog/2026-3-05-pi-router/#Hostapd\n\n[^6]: LuCI documentation: https://openwrt.github.io/luci/jsapi/\n\n[^7]: Cudy TR3000 OpenWrt documentation: https://openwrt.org/toh/cudy/tr3000&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2026-1-15-2026-first-post&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Travel album Jan.2026&quot;],&quot;date&quot;:[3,&quot;2026-01-15T00:00:00.000Z&quot;],&quot;image&quot;:[0,&quot;/assets/2026-1-15-resources/Tromso/48.avif&quot;],&quot;categories&quot;:[1,[[0,&quot;Travel&quot;]]],&quot;authors&quot;:[1,[[0,&quot;Zihao Fu&quot;]]],&quot;tags&quot;:[1,[[0,&quot;others&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;Travel blogs during end of 2025 and start of 2026\n\n&lt;!-- markdownlint-disable MD033 --&gt;\n\n&gt; As I mentioned in the last blog, I will post out some selected photos during my winter holiday.\nYou can click the photos on the \&quot;photo wall\&quot; to view the original photos. The photo wall is\nrefreshed dynamically and there are hundreds of photos, on some old devices it might take some\ntime for the algorithm.\n\n## Nice, Monaco and nearby cities\n\n&gt; End of 2025. Dec 23 to Dec 25\n\nThe first stop of the trip — a quick photo dump.\n\n&lt;section class=\&quot;heart-gallery\&quot; aria-label=\&quot;Nice and Monaco photo collage\&quot; data-gallery=\&quot;nice\&quot;&gt;\n  &lt;div class=\&quot;heart-grid\&quot; role=\&quot;list\&quot;&gt;\n    &lt;button class=\&quot;cell\&quot; type=\&quot;button\&quot; data-src=\&quot;/assets/2026-1-15-resources/Nice_Monacco/1.avif\&quot; aria-label=\&quot;Open photo 1\&quot;&gt;&lt;/button&gt;\n    &lt;button class=\&quot;cell\&quot; type=\&quot;button\&quot; data-src=\&quot;/assets/2026-1-15-resources/Nice_Monacco/2.avif\&quot; aria-label=\&quot;Open photo 2\&quot;&gt;&lt;/button&gt;\n    &lt;button class=\&quot;cell\&quot; type=\&quot;button\&quot; data-src=\&quot;/assets/2026-1-15-resources/Nice_Monacco/3.avif\&quot; aria-label=\&quot;Open photo 3\&quot;&gt;&lt;/button&gt;\n    &lt;button class=\&quot;cell\&quot; type=\&quot;button\&quot; data-src=\&quot;/assets/2026-1-15-resources/Nice_Monacco/4.avif\&quot; aria-label=\&quot;Open photo 4\&quot;&gt;&lt;/button&gt;\n    &lt;button class=\&quot;cell\&quot; type=\&quot;button\&quot; data-src=\&quot;/assets/2026-1-15-resources/Nice_Monacco/5.avif\&quot; aria-label=\&quot;Open photo 5\&quot;&gt;&lt;/button&gt;\n    &lt;button class=\&quot;cell\&quot; type=\&quot;button\&quot; data-src=\&quot;/assets/2026-1-15-resources/Nice_Monacco/6.avif\&quot; aria-label=\&quot;Open photo 6\&quot;&gt;&lt;/button&gt;\n    &lt;button class=\&quot;cell\&quot; type=\&quot;button\&quot; data-src=\&quot;/assets/2026-1-15-resources/Nice_Monacco/7.avif\&quot; aria-label=\&quot;Open photo 7\&quot;&gt;&lt;/button&gt;\n    &lt;button class=\&quot;cell\&quot; type=\&quot;button\&quot; data-src=\&quot;/assets/2026-1-15-resources/Nice_Monacco/8.avif\&quot; aria-label=\&quot;Open photo 8\&quot;&gt;&lt;/button&gt;\n    &lt;button class=\&quot;cell\&quot; type=\&quot;button\&quot; data-src=\&quot;/assets/2026-1-15-resources/Nice_Monacco/9.avif\&quot; aria-label=\&quot;Open photo 9\&quot;&gt;&lt;/button&gt;\n    &lt;button class=\&quot;cell\&quot; type=\&quot;button\&quot; data-src=\&quot;/assets/2026-1-15-resources/Nice_Monacco/10.avif\&quot; aria-label=\&quot;Open photo 10\&quot;&gt;&lt;/button&gt;\n    &lt;button class=\&quot;cell\&quot; type=\&quot;button\&quot; data-src=\&quot;/assets/2026-1-15-resources/Nice_Monacco/11.avif\&quot; aria-label=\&quot;O ria-label=\&quot;Open photo 6\&quot;&gt;&lt;/button&gt;\n    &lt;button class=\&quot;cell\&quot; type=\&quot;button\&quot; data-src=\&quot;/assets/2026-1-15-resources/madrid/7.avif\&quot; aria-label=\&quot;Open photo 7\&quot;&gt;&lt;/button&gt;\n    &lt;button class=\&quot;cell\&quot; type=\&quot;button\&quot; data-src=\&quot;/assets/2026-1-15-resources/madrid/8.avif\&quot; aria-label=\&quot;Open photo 8\&quot;&gt;&lt;/button&gt;\n    &lt;button class=\&quot;cell\&quot; type=\&quot;button\&quot; data-src=\&quot;/assets/2026-1-15-resources/madrid/9.avif\&quot; aria-label=\&quot;Open photo 9\&quot;&gt;&lt;/button&gt;\n    &lt;button class=\&quot;cell\&quot; type=\&quot;button\&quot; data-src=\&quot;/assets/2026-1-15-resources/madrid/10.avif\&quot; aria-label=\&quot;Open photo 10\&quot;&gt;&lt;/button&gt;\n    &lt;button class=\&quot;cell\&quot; type=\&quot;button\&quot; data-src=\&quot;/assets/2026-1-15-resources/madrid/11.avif\&quot; aria-label=\&quot;Open photo 11\&quot;&gt;&lt;/button&gt;\n    &lt;button class=\&quot;cell\&quot; type=\&quot;button\&quot; data-src=\&quot;/assets/2026-1-15-resources/madrid/12.avif\&quot; aria-label=\&quot;Open photo 12\&quot;&gt;&lt;/button&gt;\n  &lt;/div&gt;\n&lt;/section&gt;\n\n&lt;!-- Shared lightbox (reusable across multiple galleries on this page) --&gt;\n&lt;div class=\&quot;lightbox\&quot; hidden aria-hidden=\&quot;true\&quot;&gt;\n  &lt;button class=\&quot;lightbox__backdrop\&quot; type=\&quot;button\&quot; aria-label=\&quot;Close\&quot;&gt;&lt;/button&gt;\n  &lt;figure class=\&quot;lightbox__panel\&quot; role=\&quot;dialog\&quot; aria-modal=\&quot;true\&quot; aria-label=\&quot;Expanded photo\&quot;&gt;\n    &lt;img class=\&quot;lightbox__img\&quot; alt=\&quot;\&quot; /&gt;\n    &lt;button class=\&quot;lightbox__close\&quot; type=\&quot;button\&quot; aria-label=\&quot;Close\&quot;&gt;✕&lt;/button&gt;\n  &lt;/figure&gt;\n&lt;/div&gt;\n\n&lt;style&gt;\n  /* Shared gallery styles (reusable across posts/pages) */\n  .heart-gallery { max-width: 900px; margin: 0 auto; }\n  .heart-grid {\n    position: relative;\n    width: 100%;\n    height: clamp(360px, 55vw, 560px);\n    border-radius: 18px;\n  }\n\n  .cell {\n    width: clamp(52px, 7.5vw, 92px);\n    aspect-ratio: 1 / 1;\n    border: 0;\n    padding: 0;\n    border-radius: 14px;\n    cursor: pointer;\n    background: var(--img) center / cover no-repeat;\n    box-shadow: 0 8px 20px rgba(0,0,0,.12);\n    position: absolute;\n    left: 0;\n    top: 0;\n    --lift: 0px;\n    --scale: 1;\n    --rot: 0deg;\n    transform: translate(-50%, -50%) rotate(var(--rot)) translateY(var(--lift)) scale(var(--scale));\n    transition: transform .12s ease, box-shadow .12s ease, filter .12s ease;\n  }\n  .cell:hover { --lift: -4px; box-shadow: 0 12px 28px rgba(0,0,0,.18); }\n  .cell:active { --lift: 0px; --scale: .98; filter: brightness(.96); }\n  .cell:focus-visible { outline: 3px solid rgba(99,102,241,.65); outline-offset: 3px; }\n\n  .cell.off {\n    display: none;\n  }\n\n  /* Lightbox */\n  .lightbox {\n    position: fixed;\n    inset: 0;\n    /* Use a very high z-index to beat theme headers/overlays */\n    z-index: 2147483647;\n    display: grid;\n    place-items: center;\n  }\n  .lightbox[hidden] { display: none; }\n\n  .lightbox__backdrop {\n    position: absolute;\n    inset: 0;\n    border: 0;\n    background: rgba(0,0,0,.6);\n    cursor: zoom-out;\n  }\n\n  .lightbox__panel {\n    position: relative;\n    margin: 0;\n    /* Bigger expanded container */\n    width: min(98vw, 1400px);\n    height: min(94vh, 900px);\n    box-sizing: border-box;\n    background: rgba(20,20,20,.92);\n    border-radius: 18px;\n    overflow: hidden;\n    box-shadow: 0 22px 70px rgba(0,0,0,.5);\n    display: grid;\n    place-items: center;\n    transform: scale(.98);\n    opacity: 0;\n    transition: transform .18s ease, opacity .18s ease;\n  }\n\n  .lightbox.is-open .lightbox__panel {\n    transform: scale(1);\n    opacity: 1;\n  }\n\n  .lightbox__img {\n    /* Keep original aspect ratio in expanded view (no cropping) */\n    width: 100%;\n    height: 100%;\n    object-fit: contain !important;\n    object-position: center;\n    user-select: none;\n    -webkit-user-drag: none;\n    background: rgba(0,0,0,.15);\n  }\n\n  .lightbox__close {\n    position: absolute;\n    top: 10px;\n    right: 10px;\n    border: 0;\n    border-radius: 12px;\n    padding: 10px 12px;\n    background: rgba(255,255,255,.12);\n    color: #fff;\n    cursor: pointer;\n    font-size: 16px;\n    line-height: 1;\n    transition: background .12s ease, transform .12s ease;\n  }\n  .lightbox__close:hover { background: rgba(255,255,255,.18); }\n  .lightbox__close:active { transform: scale(.98); }\n  .lightbox__close:focus-visible { outline: 3px solid rgba(255,255,255,.45); outline-offset: 3px; }\n&lt;/style&gt;\n\n&lt;script&gt;\n  (() =&gt; {\n    // Randomly scatter images in the gallery (no heart/grid shape).\n    function scatterGallery(gallery) {\n      const grid = gallery.querySelector(\&quot;.heart-grid\&quot;);\n      if (!grid) return;\n\n      const cells = Array.from(grid.querySelectorAll(&#39;.cell[data-src]&#39;));\n      if (cells.length === 0) return;\n\n      const rect = grid.getBoundingClientRect();\n      const W = rect.width;\n      const H = rect.height;\n      if (W &lt; 10 || H &lt; 10) return;\n\n      // Basic collision-avoidance to reduce heavy overlaps.\n      // Optimized: use a spatial hash so we only compare against nearby points.\n      // This avoids the O(n^2) worst-case behavior when there are many photos.\n      const sampleCell = cells[0];\n      const cellW = Math.max(1, sampleCell.offsetWidth);\n      const cellH = Math.max(1, sampleCell.offsetHeight);\n      const pad = Math.max(cellW, cellH) * 0.6;\n      const rangeX = Math.max(0, W - pad * 2);\n      const rangeY = Math.max(0, H - pad * 2);\n\n      const minDist = pad * 0.9;\n      const minDistSq = minDist * minDist;\n      const bucketSize = Math.max(1, minDist);\n      const buckets = new Map();\n      const maxTriesPerCell = 80;\n\n      function bucketKey(ix, iy) {\n        return `${ix},${iy}`;\n      }\n\n      function addPlacedPoint(x, y) {\n        const ix = Math.floor(x / bucketSize);\n        const iy = Math.floor(y / bucketSize);\n        const key = bucketKey(ix, iy);\n        let bucket = buckets.get(key);\n        if (!bucket) {\n          bucket = [];\n          buckets.set(key, bucket);\n        }\n        bucket.push({ x, y });\n      }\n\n      function canPlaceAt(x, y) {\n        const ix = Math.floor(x / bucketSize);\n        const iy = Math.floor(y / bucketSize);\n        for (let dx = -1; dx &lt;= 1; dx++) {\n          for (let dy = -1; dy &lt;= 1; dy++) {\n            const bucket = buckets.get(bucketKey(ix + dx, iy + dy));\n            if (!bucket) continue;\n            for (const p of bucket) {\n              const ddx = x - p.x;\n              const ddy = y - p.y;\n              if (ddx * ddx + ddy * ddy &lt; minDistSq) return false;\n            }\n          }\n        }\n        return true;\n      }\n\n      for (const [index, cell] of cells.entries()) {\n        // Ensure it has a stable rotation across resizes.\n        if (!cell.dataset.rot) {\n          cell.dataset.rot = (Math.random() * 28 - 14).toFixed(2);\n        }\n        cell.style.setProperty(\&quot;--rot\&quot;, `${cell.dataset.rot}deg`);\n\n        let best = null;\n\n        // If we already have normalized coords from a prior layout pass, reuse them.\n        const hasSaved = Number.isFinite(Number(cell.dataset.nx)) &amp;&amp; Number.isFinite(Number(cell.dataset.ny));\n        if (hasSaved) {\n          const nx = Math.min(1, Math.max(0, Number(cell.dataset.nx)));\n          const ny = Math.min(1, Math.max(0, Number(cell.dataset.ny)));\n          best = {\n            x: pad + nx * rangeX,\n            y: pad + ny * rangeY,\n          };\n        } else {\n          let tries = 0;\n          while (tries++ &lt; maxTriesPerCell) {\n            const x = pad + Math.random() * rangeX;\n            const y = pad + Math.random() * rangeY;\n            if (canPlaceAt(x, y)) {\n              best = { x, y };\n              break;\n            }\n          }\n\n          // Fall back: take something even if overlaps.\n          if (!best) {\n            best = {\n              x: pad + Math.random() * rangeX,\n              y: pad + Math.random() * rangeY,\n            };\n          }\n\n          // Save normalized coords so resizing doesn&#39;t reshuffle.\n          cell.dataset.nx = rangeX &gt; 0 ? ((best.x - pad) / rangeX).toFixed(4) : \&quot;0.5\&quot;;\n          cell.dataset.ny = rangeY &gt; 0 ? ((best.y - pad) / rangeY).toFixed(4) : \&quot;0.5\&quot;;\n        }\n\n        cell.style.left = `${best.x}px`;\n        cell.style.top = `${best.y}px`;\n        cell.style.zIndex = String(10 + index);\n\n        addPlacedPoint(best.x, best.y);\n      }\n    }\n\n    function scatterAllGalleries() {\n      document.querySelectorAll(&#39;.heart-gallery&#39;).forEach(scatterGallery);\n    }\n\n    // Lazy-load background images using IntersectionObserver for performance\n    function setupLazyLoading() {\n      const cells = document.querySelectorAll(&#39;.heart-gallery .cell[data-src]&#39;);\n      \n      // Fallback for browsers without IntersectionObserver\n      if (!(&#39;IntersectionObserver&#39; in window)) {\n        cells.forEach(cell =&gt; {\n          const src = cell.getAttribute(&#39;data-src&#39;);\n          if (src) {\n            cell.style.setProperty(&#39;--img&#39;, `url(&#39;${src}&#39;)`);\n          }\n        });\n        return;\n      }\n\n      // Modern approach with IntersectionObserver\n      const observer = new IntersectionObserver((entries) =&gt; {\n        entries.forEach(entry =&gt; {\n          if (entry.isIntersecting) {\n            const cell = entry.target;\n            const src = cell.getAttribute(&#39;data-src&#39;);\n            if (src &amp;&amp; !cell.style.getPropertyValue(&#39;--img&#39;)) {\n              cell.style.setProperty(&#39;--img&#39;, `url(&#39;${src}&#39;)`);\n              observer.unobserve(cell);\n            }\n          }\n        });\n      }, {\n        rootMargin: &#39;50px&#39;, // Start loading slightly before entering viewport\n        threshold: 0.01\n      });\n\n      cells.forEach(cell =&gt; observer.observe(cell));\n    }\n\n    const lightbox = document.querySelector(\&quot;.lightbox\&quot;);\n    if (!lightbox) return;\n\n    // Some Jekyll themes apply transforms to content containers, which can break\n    // `position: fixed` (it becomes relative to the transformed ancestor).\n    // Moving the lightbox to &lt;body&gt; ensures it truly covers the viewport.\n    if (lightbox.parentElement !== document.body) {\n      document.body.appendChild(lightbox);\n    }\n\n    const backdrop = lightbox.querySelector(\&quot;.lightbox__backdrop\&quot;);\n    const closeBtn = lightbox.querySelector(\&quot;.lightbox__close\&quot;);\n    const img = lightbox.querySelector(\&quot;.lightbox__img\&quot;);\n    const panel = lightbox.querySelector(\&quot;.lightbox__panel\&quot;);\n\n    let lastFocus = null;\n\n    function clampToViewport(numerator, denominator, maxW, maxH) {\n      // Returns { w, h } keeping ratio numerator/denominator within maxW/maxH\n      const ratio = numerator / denominator;\n      let w = maxW;\n      let h = w / ratio;\n      if (h &gt; maxH) {\n        h = maxH;\n        w = h * ratio;\n      }\n      return { w, h };\n    }\n\n    function fitPanelToImage() {\n      if (!panel || !img || !img.naturalWidth || !img.naturalHeight) return;\n      const maxW = Math.floor(window.innerWidth * 0.98);\n      const maxH = Math.floor(window.innerHeight * 0.94);\n      const { w, h } = clampToViewport(img.naturalWidth, img.naturalHeight, maxW, maxH);\n      panel.style.width = `${Math.max(320, Math.floor(w))}px`;\n      panel.style.height = `${Math.max(240, Math.floor(h))}px`;\n    }\n\n    function openLightbox(src, alt = \&quot;\&quot;) {\n      lastFocus = document.activeElement;\n      // Reset any previous sizing until we can compute the new image ratio.\n      if (panel) {\n        panel.style.width = \&quot;\&quot;;\n        panel.style.height = \&quot;\&quot;;\n      }\n\n      img.src = src;\n      img.alt = alt;\n\n      // When the image loads, size the container to match its ratio.\n      img.addEventListener(\&quot;load\&quot;, fitPanelToImage, { once: true });\n      if (img.complete) fitPanelToImage();\n\n      lightbox.hidden = false;\n      lightbox.setAttribute(\&quot;aria-hidden\&quot;, \&quot;false\&quot;);\n      requestAnimationFrame(() =&gt; lightbox.classList.add(\&quot;is-open\&quot;));\n      closeBtn.focus();\n      document.body.style.overflow = \&quot;hidden\&quot;;\n    }\n\n    function closeLightbox() {\n      lightbox.classList.remove(\&quot;is-open\&quot;);\n      lightbox.setAttribute(\&quot;aria-hidden\&quot;, \&quot;true\&quot;);\n      setTimeout(() =&gt; {\n        lightbox.hidden = true;\n        img.removeAttribute(\&quot;src\&quot;);\n        if (panel) {\n          panel.style.width = \&quot;\&quot;;\n          panel.style.height = \&quot;\&quot;;\n        }\n        document.body.style.overflow = \&quot;\&quot;;\n        if (lastFocus &amp;&amp; lastFocus.focus) lastFocus.focus();\n      }, 180);\n    }\n\n    window.addEventListener(\&quot;resize\&quot;, () =&gt; {\n      if (lightbox.hidden) return;\n      fitPanelToImage();\n    });\n\n    // Scatter once the page is ready, and re-apply on resize (no reshuffle).\n    // Throttled to animation frames so we don&#39;t do heavy work for every resize event.\n    scatterAllGalleries();\n    setupLazyLoading();\n    let scatterRaf = 0;\n    function scheduleScatter() {\n      if (scatterRaf) return;\n      scatterRaf = requestAnimationFrame(() =&gt; {\n        scatterRaf = 0;\n        scatterAllGalleries();\n      });\n    }\n    window.addEventListener(\&quot;resize\&quot;, scheduleScatter, { passive: true });\n\n    document.addEventListener(\&quot;click\&quot;, (e) =&gt; {\n      const cell = e.target.closest?.(\&quot;.heart-gallery .cell[data-src]\&quot;);\n      if (!cell) return;\n      const src = cell.getAttribute(\&quot;data-src\&quot;);\n      if (!src) return;\n      openLightbox(src, cell.getAttribute(\&quot;aria-label\&quot;) || \&quot;Expanded photo\&quot;);\n    });\n\n    backdrop.addEventListener(\&quot;click\&quot;, closeLightbox);\n    closeBtn.addEventListener(\&quot;click\&quot;, closeLightbox);\n\n    document.addEventListener(\&quot;keydown\&quot;, (e) =&gt; {\n      if (lightbox.hidden) return;\n      if (e.key === \&quot;Escape\&quot;) closeLightbox();\n    });\n  })();\n&lt;/script&gt;&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2026-1-21-newstufflearned&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Tech I&#39;ve picked up this winter&quot;],&quot;date&quot;:[3,&quot;2026-01-30T00:00:00.000Z&quot;],&quot;image&quot;:[0,&quot;/assets/2026-1-28-resources/myUbuntuDesktop.avif&quot;],&quot;categories&quot;:[1,[[0,&quot;general&quot;]]],&quot;authors&quot;:[1,[[0,&quot;Zihao Fu&quot;]]],&quot;tags&quot;:[1,[[0,&quot;others&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;Lots of fun, and lots of self-hosting projects! I’ve now abandoned Windows entirely; all of my devices\nare running Ubuntu or Debian.\n\n_My Ubuntu Desktop_\n![My Ubuntu Desktop](/assets/2026-1-28-resources/myUbuntuDesktop.avif)\n\n## Intro\n\nDuring this winter, I have picked up lots of new stuff.\n\nFirewalls that filter outbound connections are annoying, and I hated them. There are technologies\nthat can help bypass these restrictions: a proxy or a virtual private network (VPN).\nI used to use a commercial VPN, but I no longer trusted it. The VPN provider can act as a man-in-the-middle,\nand they can observe your traffic metadata. If it is unencrypted (HTTP), they can see the\ncontent you are sending. For HTTPS, it’s better, but they can still log your information: what websites you visit, and how much data is transferred.\nTherefore, I decided to set up my own solution.\nThe main motivation is that this used to be a black box to me, and I started to worry about my privacy.\n\nOn my way to seeking freedom and privacy, I picked up lots of network- and Linux-related knowledge.\n\n### Jumping\n\n- [**RustDesk**](#rustdesk)\n- [**Nginx**](#nginx)\n- [**Home Server**](#home-server)\n- [**Experience different proxy protocols**](#protocols)\n- [**Reverse Shell**](#reverse-shell)\n\n## RustDesk OSS {#rustdesk}\n\nWhen I was back at King&#39;s College, we all needed to use Chromebooks. Chrome OS is a very secure operating system due to its nature: only web apps can be installed, and malware has little chance to survive.\nChromeOS settings can also be easily managed by the school. They can configure your browser settings and even prevent you from entering the bootloader. (You can’t enter the bootloader and flash another operating system.)\nThe rules back in 2022 were already strict, but now their security has gotten even better. JavaScript from `file://`\nis disabled, according to my friends still at the college. That means drag-and-drop games can’t be played.\n\n### Some observations for \&quot;jailbreaker\&quot;\n\n1. ChromeOS restricts users to browsers only. You can’t change extensions.\n2. Hard coded bans. Some websites are banned entirely even if you switch to different networks. This seems like an on-device blocking mechanism.\n3. Some websites are only banned when connected to school network. Often redirect to a school page that says this\n   site is not allowed. We can confirm it is DNS-level blocking. Using a direct IP can bypass this blocking. But may face SNI issue.\n4. The school firewall uses a blacklist to restrict access.\n\nFrom these observations, one possible solution is to use a proxy that can be used in a browser. The first idea I came up with was to write a simple browser in JS with proxy support. This is naïve in hindsight.\nThe second idea was to use a remote VPS to stream a browser to users. This is extremely slow, needs lots of compute resources, and latency can be high. The second solution was implemented for a few months and reached an “able to use” level, but it was far from pleasant. It was called **neko browser**.\n\nThe last idea is **RustDesk**. The server can be self-hosted and open-source, with web client support. I had a public IPv4 from my house in Madrid, and I hosted the server from home; my friends lived in Madrid as well. This\ngave them a chance to use their own computers with super low latency. It is by far the best solution. The setup using\nDocker is super simple. One thing to note is the web client uses HTTPS; it needs a reverse proxy tool like Nginx to terminate TLS and forward traffic to the RustDesk server.\n\n_Rustdesk Demo_\n![RustDesk](/assets/2026-1-28-resources/rustdesk.avif)\n\nIf I don’t host my own relay and use the public one instead, the latency becomes terrible, a nightmare to use. All network packets have to traverse the public relay, and you can really feel the lag.\n\n## Nginx {#nginx}\n\nNginx is a powerful tool I’ve been using recently. Many VPN servers use port 443 to camouflage\nas normal websites. Nginx can read SNI (Server Name Indication), which lets you proxy different protocols to\ndifferent backend servers while only using one port.\n\n### A snippet from my server setup\n\n```nginx\nstream {\n  map $ssl_preread_server_name $tcp_backend {\n      hostnames;\n      manchester.zihaofu245.me 127.0.0.1:1212;  # trojan server\n      mirror.zihaofu245.me 127.0.0.1:8443;      # nginx mirror server\n      zihaofu245.cloud 127.0.0.1:8443;          # cloud\n      default 127.0.0.1:1212;                   # default backend\n  }\n\n  # Forward all 443 traffic based on SNI\n  server {\n      listen 443;\n      listen [::]:443;\n      proxy_pass $tcp_backend;\n      ssl_preread on;\n  }\n\n  # HTTP3 / QUIC support\n  server {\n      listen 443 udp;\n      proxy_pass 127.0.0.1:1212;                # Hysteria server\n  }\n}\n```\n\nBefore using Nginx, I had to remember different ports for each configuration. Now it’s all on port 443, easier to\nremember and better camouflage.\n\n## Raspberry Pi deployed as a server in Madrid {#home-server}\n\nI brought a Raspberry Pi to Madrid this winter. After requesting a public static IPv4 address,\nI made it my home server. I deployed an Nginx server, a RustDesk relay, and many other services.\n\n_Tiny, yet powerful_\n![hs](/assets/2026-1-28-resources/homeServer.avif)\n\n## Other proxy protocols that I have tried besides WireGuard {#protocols}\n\nOpen source stuff that I&#39;ve tried:\n\n1. Shadowsocks\n2. Trojan\n3. Hysteria2\n4. sing-box\n5. Lightway (ExpressVPN)\n6. WireGuard\n\nI’ve heard many people say WireGuard is a light and super fast VPN protocol. After my tests,\nI don’t think that’s always true. WireGuard uses the ChaCha20-Poly1305 encryption algorithm, a CPU-friendly\nchoice, but it can be a bottleneck in some cases. Other protocols may rely on the system OpenSSL\nshared library. These libraries are highly optimized and native. With AES encryption and\nhardware acceleration (AES-NI), performance can surpass WireGuard in some scenarios.\n\n## Reverse Shell {#reverse-shell}\n\n&gt; [!IMPORTANT]\n&gt; **Disclaimer:** This reverse shell project is created strictly for educational and experimental purposes in controlled environments only. I do not condone or take responsibility for any misuse, unauthorized access, or illegal activity resulting from this work.\n\nA reverse shell is often used as a backdoor; it can bypass firewalls easily. It’s often considered a\nharmful tool. Many AI tools aren’t willing to help implement it, so I did some research and implemented\nmy own version.\n\n[**reverse-shell.tar.xz**](/assets/2026-1-28-resources/reverse-shell.tar.xz)\n\nThis is cross-platform. TTY works perfectly on Linux; Darwin should behave similarly.\nWindows usage is limited: it’s not interactive, only stdio over TCP. The `main.go` file is a Windows service,\nuse `sc.exe` to start it.\nYou’ll likely want to modify the source code\nand build it again. As-is, the shell destination points to my server, so don’t run the attached binary unless you understand what it does.\n\n## Winter wrap-up on Jan 30th\n\nThis winter was fantastic. I left Madrid for a year and a half and finally came back for a visit.\nI went to France, Denmark, and Norway, such beautiful places. [Check the photos here.](/blog/2026-1-15-2026-first-post)\nI learned a lot and had lots of fun. Kicking off 2026 perfectly. Time flies; I’m 15 now.\n\n&gt; I hate going to school, especially at the end of a holiday.&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2026-3-05-pi-router&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;DIY Raspberry Pi router tutorial (MT7925)&quot;],&quot;date&quot;:[3,&quot;2026-03-05T00:00:00.000Z&quot;],&quot;image&quot;:[0,&quot;/assets/2026-03-05-resources/5.jpeg&quot;],&quot;categories&quot;:[1,[[0,&quot;Tech&quot;]]],&quot;authors&quot;:[1,[[0,&quot;Zihao Fu&quot;]]],&quot;tags&quot;:[1,[[0,&quot;others&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;&gt; I built a Raspberry Pi router with a Raspberry Pi 5 and a Wi-Fi card.\n\nI achieved **Wi-Fi 6** and **UPnP**, boosting throughput close to the Ethernet bandwidth limit.\n\nWhat is more? Symmetric NAT (eduroam) =&gt; port-restricted NAT with UPnP.\n\n&lt;!-- markdownlint-disable MD033 --&gt;\n&lt;!-- markdownlint-disable MD051 --&gt;\n&lt;!-- markdownlint-disable MD026 --&gt;\n\n&lt;figure style=\&quot;text-align:center;\&quot;&gt;\n  &lt;img src=\&quot;/assets/2026-03-05-resources/6.jpeg\&quot; alt=\&quot;Pi router\&quot; style=\&quot;width:50%;max-width:440px;display:block;margin:0 auto;\&quot; /&gt;\n&lt;/figure&gt;\n&lt;div style=\&quot;text-align:center; font-size:0.85rem;color:#64748b;margin-top:.4rem;\&quot;&gt;My setup&lt;/div&gt;\n\n## How to make a router with Raspberry Pi\n\n### Introduction\n\n#### Software used:\n\n1. **hostapd**: Controls Wi-Fi interfaces, handles SSID broadcasting, and WPA authentication.\n2. **dnsmasq / Pi-hole**: Both dnsmasq and Pi-hole can be used as a DHCP server (assign IPs) and DNS server.\n   I use Pi-hole for DNS only (port 53) and dnsmasq for DHCP (port 67).\n3. **miniupnpd**: Provides UPnP capability for P2P connections.\n4. **nftables**: Linux firewall. `iptables` is more complex to manage, and `ufw` lacks thorough control.\n   miniupnpd works well with nftables.\n\n#### Steps / sections:\n\n1. [Driver handling](#Driver)\n2. [hostapd installation](#Hostapd)\n3. [Configure Pi-hole and dnsmasq](#DHCP)\n4. [UPnP setup](#UPnP)\n5. [Benchmarking](#Benchmark)\n6. [Hardware selection](#Hardware)\n\n### Hardware list\n\n- Raspberry Pi 5 (8 GB)\n- MediaTek MT7925 Wi-Fi card (or any Wi-Fi card you already have)\n- Raspberry Pi HAT: PCIe to M.2 Key E\n- 2 antennas\n\nAssemble the hardware before you continue.\n\n## 1. Check Wi-Fi card compatibility {#Driver}\n\n&gt; [!IMPORTANT]\n&gt; Latest Raspberry Pi 5 kernel fully supports `mt7925`, so you no longer need to compile the kernel yourself.\n\nMy Wi-Fi card (MT7925) is not fully supported on Raspberry Pi OS with kernel `6.12.y`.\nAfter I plugged it in, the Wi-Fi interface did not appear. If you are on newer kernels,\nit might work out of the box. I had to rebuild the kernel myself. Below is how to do it.\n\n&gt; [!NOTE]\n&gt; If your Wi-Fi card driver already works and you can see it in `ip addr`, skip this step.\n\nIf you are using Intel cards, like BE200 or AX210, they are likely supported. You should\nfind an interface (usually `wlan1`) in `ip a`. However, Intel cards are generally better\nfor client mode; AP mode has been better for me on MediaTek.\n\n&gt; [Mediatek MT7925e fails to probe/bind on Raspberry Pi 5 PCIe bus with error -12](https://github.com/raspberrypi/linux/issues/7046#issuecomment-3794631559)\n&gt;\n&gt; By March 6, 2026, mainline support in Raspberry Pi OS kernels for MT7925 on this setup is still incomplete.\n\n&gt; [Raspberry Pi official documentation: build custom kernel](https://www.raspberrypi.com/documentation/computers/linux_kernel.html#building)\n\n### Check PCIe\n\n```bash\nzihao@hkg:~ $ lspci\n0001:00:00.0 PCI bridge: Broadcom Inc. and subsidiaries BCM2712 PCIe Bridge (rev 30)\n0001:01:00.0 Network controller: MEDIATEK Corp. MT7925 (RZ717) Wi-Fi 7 160MHz\n0002:00:00.0 PCI bridge: Broadcom Inc. and subsidiaries BCM2712 PCIe Bridge (rev 30)\n0002:01:00.0 Ethernet controller: Raspberry Pi Ltd RP1 PCIe 2.0 South Bridge\n```\n\nYou need `MEDIATEK Corp. MT7925` to appear here.\n\n### Fetch kernel source, prepare\n\n```bash\nsudo apt update\nsudo apt install -y git bc bison flex libssl-dev ccache make \\\n  libncurses-dev dwarves rsync\n\ngit clone --depth 1 https://github.com/raspberrypi/linux.git\ncd linux\n\nmake bcm2712_defconfig\nmake olddefconfig\nmake menuconfig\n```\n\nIn `make menuconfig`: `Device Drivers -&gt; Network device support -&gt; Wireless LAN -&gt; MediaTek mt7925 support`.\nMark them as `M` (kernel loadable modules).\n\nRun `grep MT7925 .config` to make sure these options are enabled.\n\n### Compile\n\n```bash\nmake -j\&quot;$(nproc)\&quot; Image modules dtbs\n```\n\nWait for it to finish.\n\n### Install\n\n```bash\nsudo cp /boot/firmware/kernel_2712.img /boot/firmware/kernel_2712.img.bak.$(date +%F-%H%M)\nsudo cp arch/arm64/boot/Image /boot/firmware/kernel_2712.img\nsudo make modules_install\nsudo make dtbs_install\nsudo depmod -a\n```\n\nYou also need to add `dtoverlay=pcie-32bit-dma-pi5` in the `[all]` section of `/boot/firmware/config.txt`.\nAfter that, run `sudo reboot`.\n\n### Verify\n\n```bash\nzihao@hkg:~ $ ip a show wlan1\n4: wlan1: &lt;BROADCAST,MULTICAST,UP,LOWER_UP&gt; mtu 1500 qdisc noqueue state UP group default qlen 1000\n    link/ether 84:9e:56:9c:71:a5 brd ff:ff:ff:ff:ff:ff\n    inet 192.168.50.1/24 scope global wlan1\n       valid_lft forever preferred_lft forever\n    inet6 fe80::869e:56ff:fe9c:71a5/64 scope link proto kernel_ll\n       valid_lft forever preferred_lft forever\n```\n\nIf you see the interface appear, the issue is solved. On Raspberry Pi OS, `nmcli` may automatically\nmanage this interface in client mode. The output above is already configured for AP mode.\n\n## 2. Set AP mode {#Hostapd}\n\n### Unmanage from NetworkManager\n\n```bash\nzihao@hkg:~ $ cd /etc/NetworkManager/conf.d\nzihao@hkg:/etc/NetworkManager/conf.d $ ls\n10-unmanage-wlan1.conf\nzihao@hkg:/etc/NetworkManager/conf.d $ cat 10-unmanage-wlan1.conf\n[keyfile]\nunmanaged-devices=interface-name:wlan1\n```\n\n### Install hostapd\n\n1. Through apt:\n\n```bash\nsudo apt install hostapd\n```\n\n2. Build from source if you need newer features:\n\n```bash\nsudo apt update\nsudo apt install -y \\\n  build-essential pkg-config git \\\n  libnl-3-dev libnl-genl-3-dev \\\n  libssl-dev libsqlite3-dev\ngit clone https://w1.fi/hostap.git\ncd hostap/hostapd\ncp defconfig .config\nnano .config\n```\n\nSet your required features in `.config`, for example, `CONFIG_SAE=y`.\nThe default config is generally complete. For Wi-Fi 7, `IEEE 802.11be` is usually enabled by default.\n\n```bash\nmake -j\&quot;$(nproc)\&quot;\n```\n\nPlace the built `hostapd` binary in a location like `/usr/local/bin`,\nthen add a systemd unit file.\n\n```bash\nzihao@hkg:~ $ sudo systemctl cat hostapd\n# /etc/systemd/system/hostapd.service\n[Unit]\nDescription=hostapd IEEE 802.11 AP and authentication server\nWants=network-online.target\nAfter=network-online.target\n\n[Service]\nType=forking\nUser=root\nGroup=root\n\nExecStart=/usr/local/bin/hostapd -B -P /run/hostapd.pid /etc/hostapd/hostapd.conf\nExecReload=/bin/kill -HUP $MAINPID\n\nPIDFile=/run/hostapd.pid\nRestart=on-failure\nRestartSec=2\n\n[Install]\nWantedBy=multi-user.target\n```\n\nCreate `/etc/hostapd/hostapd.conf`:\n\n```conf\ninterface=wlan1\ndriver=nl80211\n\nssid=WIFI_NAME\ncountry_code=ES\nieee80211d=1\nieee80211h=1\n\nhw_mode=a\nchannel=36\n\nwmm_enabled=1\n\nieee80211n=1\nieee80211ac=1\nieee80211ax=1\n# ieee80211be=1 # Kernel 6.12 still lacks full support for this setup.\n\nht_capab=[HT40+][SHORT-GI-20][SHORT-GI-40]\n\nvht_oper_chwidth=1\nvht_oper_centr_freq_seg0_idx=42\nvht_capab=[SHORT-GI-80][RXLDPC][TX-STBC-2BY1][SU-BEAMFORMEE][MU-BEAMFORMEE]\n\nhe_oper_chwidth=1\nhe_oper_centr_freq_seg0_idx=42\n\n# ===== Security: WPA3-SAE only =====\nauth_algs=1\nwpa=2\nwpa_key_mgmt=SAE\nrsn_pairwise=CCMP\n\n# PMF required for WPA3\nieee80211w=2\n\n# SAE H2E (recommended). If some clients fail, try sae_pwe=0\nsae_pwe=1\n\nwpa_passphrase=YOUR_PASSWORD\n```\n\n### Start hostapd\n\n```bash\nsudo systemctl enable --now hostapd\nsudo systemctl status hostapd\n```\n\nExpected output is similar to:\n\n```bash\nzihao@hkg:~ $ sudo systemctl status hostapd\n● hostapd.service - hostapd IEEE 802.11 AP and authentication server\n     Loaded: loaded (/etc/systemd/system/hostapd.service; enabled; preset: enabled)\n     Active: active (running) since Tue 2026-03-03 20:17:58 HKT; 2 days ago\n Invocation: 827f7ab3d457451c857c0bf0c4bf72d1\n   Main PID: 22706 (hostapd)\n      Tasks: 1 (limit: 9583)\n        CPU: 951ms\n     CGroup: /system.slice/hostapd.service\n             └─22706 /usr/local/sbin/hostapd -B -P /run/hostapd.pid /etc/hostapd/hostapd.conf\n\nMar 06 01:13:07 hkg hostapd[22706]: wlan1: STA 56:44:77:0d:1d:39 IEEE 802.11: disassociated due to in&gt;\nMar 06 01:13:08 hkg hostapd[22706]: wlan1: STA 56:44:77:0d:1d:39 IEEE 802.11: deauthenticated due to &gt;\nMar 06 05:01:18 hkg hostapd[22706]: wlan1: STA 56:44:77:0d:1d:39 IEEE 802.11: deauthenticated due to &gt;\nMar 06 09:44:03 hkg hostapd[22706]: wlan1: STA 56:44:77:0d:1d:39 IEEE 802.11: associated (aid 4)\nMar 06 09:44:03 hkg hostapd[22706]: wlan1: STA 56:44:77:0d:1d:39 RADIUS: starting accounting session &gt;\nMar 06 09:44:03 hkg hostapd[22706]: wlan1: STA 56:44:77:0d:1d:39 WPA: pairwise key handshake complete&gt;\nMar 06 09:50:23 hkg hostapd[22706]: wlan1: STA 56:44:77:0d:1d:39 IEEE 802.11: disassociated\n```\n\nNow hostapd is set up. Your Wi-Fi can be discovered, but without DHCP, clients cannot use it yet.\n\n## 3. dnsmasq and Pi-hole {#DHCP}\n\n```bash\nsudo apt install dnsmasq\n\ncurl -sSL https://install.pi-hole.net | sudo bash\n```\n\nThis installs dnsmasq and Pi-hole.\n\nCreate `/etc/dnsmasq.d/dhcp.conf`.\n\nExample config:\n\n```conf\n# DHCP only for AP\ninterface=wlan1\nbind-interfaces\n\n# DO NOT provide DNS service (Pi-hole owns :53)\nport=0\n\ndhcp-range=192.168.50.50,192.168.50.200,255.255.255.0,12h\ndhcp-option=option:router,192.168.50.1      # You are free to choose private IP ranges\ndhcp-option=option:dns-server,192.168.50.1\n\nlog-dhcp\n```\n\nNow the interface does not have a ip, `hostapd` does not allocate a ip to the interface. So\nbefore starting dnsmasq, we need to add a ip to `wlan1`.\n\nOne time method:\n\n```bash\nsudo ip addr replace 192.168.50.1/24 dev wlan1\n```\n\nTo make it presistant after reboot, prevent dnsmasq and miniupnpd failing, you would need a systmed unit runs before dnsmasq and miniupnpd.\n\nCreate `/etc/systemd/system/wlan1-lan.service`\n\n```bash\n[Unit]\nDescription=Configure LAN IPv4 on wlan1\nAfter=sys-subsystem-net-devices-wlan1.device\nBindsTo=sys-subsystem-net-devices-wlan1.device\n\n[Service]\nType=oneshot\nRemainAfterExit=yes\nExecStart=/usr/sbin/ip link set wlan1 up\nExecStart=/usr/sbin/ip addr replace 192.168.50.1/24 dev wlan1\n\n[Install]\nWantedBy=multi-user.target\n```\n\nThis systemd unit will allocate ip to wlan1 and make it presistant after reboot.\nDon&#39;t forget to add the below snippet to `dnsmasq` and `miniupnpd` configuration file.\nIf dnsmasq and miniupnpd does not wait for `wlan1-lan.service` they will fail.\n\n```bash\nAfter=hostapd.service wlan1-lan.service\nRequires=hostapd.service wlan1-lan.service\n```\n\nFor Pi-hole, configuration is located at `/etc/pihole`; tune it as needed. Use `pihole status` to check it.\n\nFinally, start the service.\n\n```bash\nsudo systemctl daemon-reload\nsudo systemctl restart dnsmasq\n```\n\nFrom this point, your Wi-Fi Access Point, DHCP and DNS is done. Last puzzle is routing.\n\n&gt; [!TIP]\n&gt; Below you can consider it as a branch, if you don&#39;t need UPnP, finish this section and your router is done.\n&gt; Otherwise, continue to next\n&gt; section. Remember routing requires sysctl and firewall confiuration, you can always come back and it may help.\n\n```bash\necho \&quot;net.ipv4.ip_forward=1\&quot; | sudo tee -a /etc/sysctl.conf # This is enables IP packets forwarding\n```\n\nand allow forwarding on your firewall from wlan1 to your WAN, also open port 53 and 67.\n\n```conf\ntable ip filter {\n    chain forward {\n        type filter hook forward priority 0; policy drop;\n\n        # Stateful firewall\n        ct state established,related accept\n\n        # Allow forwarding from LAN to WAN\n        iifname \&quot;wlan1\&quot; oifname \&quot;eth0\&quot; accept\n    }\n}\n```\n\n## 4. miniupnpd {#UPnP}\n\n&gt; [!WARNING]\n&gt; UPnP: Universal Plug and Play. It can open firewall ports automatically.\n&gt; It works well for game consoles, BitTorrent, Tailscale, etc., offering direct-connection capabilities,\n&gt; but it requires proper security enforcement during setup.\n\n### Installation\n\n```bash\nsudo apt install miniupnpd nftables\nsudo apt remove ufw\n# Do not let ufw modify the firewall from now on. Control nftables entirely.\n```\n\n### Setup\n\nBelow is the Debian miniupnpd unit file:\n\n```bash\nzihao@hkg:~ $ sudo systemctl cat miniupnpd\n# /usr/lib/systemd/system/miniupnpd.service\n[Unit]\nDescription=Lightweight UPnP IGD &amp; PCP/NAT-PMP daemon\nDocumentation=man:miniupnpd(8)\nAfter=network-online.target\n\n[Service]\nType=forking\nEnvironmentFile=-/etc/default/miniupnpd\nExecStartPre=/usr/libexec/miniupnpd-startstop-helper.sh start\nExecStart=/usr/sbin/miniupnpd -f /etc/miniupnpd/miniupnpd.conf $MiniUPnPd_OTHER_OPTIONS\nExecStopPost=/usr/libexec/miniupnpd-startstop-helper.sh stop\nPIDFile=/run/miniupnpd.pid\n\n# #1033012, do not make TasksMax too harsh\nTasksMax=16\nCapabilityBoundingSet=CAP_NET_ADMIN CAP_NET_BROADCAST CAP_NET_RAW CAP_SYSLOG\nMountAPIVFS=yes\nNoNewPrivileges=yes\nPrivateMounts=yes\nPrivateDevices=yes\nPrivateTmp=yes\nMemoryDenyWriteExecute=yes\nProtectSystem=full\nProtectHome=yes\nProtectHostname=yes\nProtectClock=yes\nProtectKernelTunables=yes\nProtectKernelModules=yes\nProtectKernelLogs=yes\nProtectControlGroups=yes\nLockPersonality=yes\nRestrictRealtime=yes\nRestrictNamespaces=yes\nRestrictSUIDSGID=yes\n\n[Install]\nWantedBy=multi-user.target\n```\n\nNotice that `miniupnpd-startstop-helper.sh` runs during startup and stop.\n\nThese helper scripts call additional scripts in `/etc/miniupnpd`:\n\n```bash\nzihao@hkg:/etc/miniupnpd $ ls\nminiupnpd.conf          nft_delete_chain.sh  nft_init.sh\nminiupnpd_functions.sh  nft_flush.sh         nft_removeall.sh\n```\n\nThe Debian-shipped miniupnpd helper scripts contain **hard-coded values**.\nSpecifically, they can hard-code creation/use of an `inet` table named `filter`\n(priority 0). If you already use your own nftables design, this hard-coded `filter`\ntable behavior can conflict with your rules and chain layout.\n\nFor example, if you load your own custom table and then start miniupnpd,\nit may inject/manage its own `filter` table/chains unexpectedly. In that case,\nclients on this Wi-Fi may fail to forward traffic to `eth0` until you align names/rules.\n\nMy suggestion: modify those helper scripts and remove the parts that create/delete\ntables you do not want managed automatically. Then, in `/etc/miniupnpd/miniupnpd.conf`,\nset `upnp_table_name` and `upnp_nat_table_name` to your intended table.\n\nExample:\n\n```conf\n# Table names for netfilter nft. Default is \&quot;filter\&quot; for both.\nupnp_table_name=filter\nupnp_nat_table_name=filter\n# Chain names for netfilter and netfilter nft\n# netfilter: defaults are MINIUPNPD, MINIUPNPD, MINIUPNPD-POSTROUTING\n# netfilter nft: defaults are miniupnpd, prerouting_miniupnpd, postrouting_miniupnpd\nupnp_forward_chain=forwardUPnP\nupnp_nat_chain=UPnP\nupnp_nat_postrouting_chain=UPnP_Postrouting\nupnp_nftables_family_split=no\n```\n\nBefore you start, make sure nftables contains these fields.\n\nExample `/etc/nftables.conf`:\n\n```conf\n#!/usr/sbin/nft -f\n\nadd table inet filter\nflush table inet filter\n\ntable inet filter {\n\n    # ---------- FILTER ----------\n    chain input {\n        type filter hook input priority 0; policy drop;\n\n        iif \&quot;lo\&quot; accept\n        ct state established,related accept # Stateful firewall\n\n        # WAN services go here\n\n        # LAN -&gt; router services\n        # 67 DHCP; 53 DNS; 1900 and 5351 for UPnP\n        iif \&quot;wlan1\&quot; udp dport {67,53,1900,5351} accept\n        iif \&quot;wlan1\&quot; tcp dport 53 accept\n\n        ip protocol icmp accept\n        ip6 nexthdr ipv6-icmp accept\n    }\n\n    chain forward {\n        type filter hook forward priority 0; policy drop;\n\n        ct state established,related accept\n\n        # Let miniupnpd-installed ACCEPT rules for forwarded mappings be evaluated\n        jump forwardUPnP\n\n        # Normal routing\n        iif \&quot;wlan1\&quot; oif \&quot;eth0\&quot; accept\n        iif \&quot;tailscale0\&quot; oif \&quot;wlan1\&quot; accept\n        iif \&quot;wlan1\&quot; oif \&quot;tailscale0\&quot; accept\n\n        # Allow DNATed flows (UPnP port-forwards) after prerouting\n        iif \&quot;eth0\&quot; oif \&quot;wlan1\&quot; ct status dnat accept\n\n        ip protocol icmp accept\n    }\n\n    chain output {\n        type filter hook output priority 0; policy accept;\n    }\n\n    # miniupnpd will add/remove rules here:\n    chain forwardUPnP { }\n\n    # ---------- NAT ----------\n    # miniupnpd will add DNAT rules in UPnP (jumped from prerouting)\n    chain prerouting {\n        type nat hook prerouting priority dstnat; policy accept;\n        jump UPnP\n    }\n\n    # miniupnpd will add SNAT helper rules here if needed\n    chain postrouting {\n        type nat hook postrouting priority srcnat; policy accept;\n\n        # Allow miniupnpd to do its NAT postrouting work first\n        jump UPnP_Postrouting\n\n        # Your masquerade rules\n        oif \&quot;eth0\&quot; ip saddr 192.168.50.0/24 masquerade\n        oif \&quot;tailscale0\&quot; ip saddr 192.168.50.0/24 masquerade\n    }\n\n    # miniupnpd will add DNAT rules here:\n    chain UPnP { }\n\n    # miniupnpd will add NAT postrouting rules here:\n    chain UPnP_Postrouting { }\n}\n```\n\n### Security tips\n\nIn `/etc/miniupnpd/miniupnpd.conf`, check this part:\n\n```bash\n# UPnP permission rules (also enforced for NAT-PMP and PCP) for IPv4\n# (allow|deny) (external port range) IP/mask (internal port range) (optional regex filter)\n# A port range is &lt;min port&gt;-&lt;max port&gt; or &lt;port&gt; if there is only\n# one port in the range.\n# IP/mask format must be nnn.nnn.nnn.nnn/nn\n# Regex support must be enabled at build time : ./configure --regex\n# It is advised to only allow redirection of ports &gt;= 1024\n# and end the rule set with \&quot;deny 0-65535 0.0.0.0/0 0-65535\&quot;\n# The following default ruleset allows specific LAN side IP addresses\n# to request only ephemeral ports. It is recommended that users\n# modify the IP ranges to match their own internal networks, and\n# also consider implementing network-specific restrictions\n# CAUTION: failure to enforce any rules may permit insecure requests to be made!\n#allow 1024-65535 192.168.0.0/24 1024-65535\n# disallow requests whose description string matches the given regex\n# deny 1024-65535 192.168.1.0/24 1024-65535 \&quot;My evil app ver [[:digit:]]*\&quot;\n#allow 1024-65535 192.168.1.0/24 1024-65535\n#allow 1024-65535 192.168.0.0/23 22\n#allow 12345 192.168.7.113/32 54321\n#deny 0-65535 0.0.0.0/0 0-65535\n\nallow 1024-65535 192.168.50.0/24 1024-65535\ndeny 0-65535 0.0.0.0/0 0-65535\n```\n\nEnsure only your LAN clients are allowed to add UPnP rules.\n\nRun `sudo systemctl enable --now miniupnpd` to start.\n\n### Final check\n\nRun `sudo nft list ruleset`. You should see a non-empty filter table with rules inside.\n\n```conf\ntable inet filter {\n    chain input {\n      type filter hook input priority filter; policy drop;\n      iif \&quot;lo\&quot; accept\n      ct state established,related accept\n      iif \&quot;eth0\&quot; udp dport { 40000, 41641 } accept\n      iif \&quot;wlan1\&quot; udp dport { 53, 67, 1900, 5351 } accept\n      iif \&quot;wlan1\&quot; tcp dport 53 accept\n      iif \&quot;tailscale0\&quot; accept\n      ip protocol icmp accept\n      ip6 nexthdr ipv6-icmp accept\n    }\n\n    chain forward {\n      type filter hook forward priority filter; policy drop;\n      ct state established,related accept\n      jump forwardUPnP\n      iif \&quot;wlan1\&quot; oif \&quot;eth0\&quot; accept\n      iif \&quot;tailscale0\&quot; oif \&quot;wlan1\&quot; accept\n      iif \&quot;wlan1\&quot; oif \&quot;tailscale0\&quot; accept\n      iif \&quot;eth0\&quot; oif \&quot;wlan1\&quot; ct status dnat accept\n      ip protocol icmp accept\n    }\n\n    chain output {\n      type filter hook output priority filter; policy accept;\n    }\n\n    chain forwardUPnP {\n      iif \&quot;eth0\&quot; th dport 41641 @nh,128,32 0xc0a832a7 @nh,72,8 0x11 accept\n    }\n\n    chain prerouting {\n      type nat hook prerouting priority dstnat; policy accept;\n      jump UPnP\n    }\n\n    chain postrouting {\n      type nat hook postrouting priority srcnat; policy accept;\n      jump UPnP_Postrouting\n      oif \&quot;eth0\&quot; ip saddr 192.168.50.0/24 masquerade\n      oif \&quot;tailscale0\&quot; ip saddr 192.168.50.0/24 masquerade\n    }\n\n    chain UPnP {\n      iif \&quot;eth0\&quot; @nh,72,8 0x11 th dport 41643 dnat ip to 192.168.50.167:41641\n    }\n\n    chain UPnP_Postrouting {\n    }\n}\n```\n\nYou can see one of my clients has already requested a UPnP rule, and it is working.\n\n## Benchmarking {#Benchmark}\n\n&lt;figure style=\&quot;text-align:center;\&quot;&gt;\n  &lt;img src=\&quot;/assets/2026-03-05-resources/3.avif\&quot; alt=\&quot;Router benchmark\&quot; style=\&quot;width:50%;max-width:440px;display:block;margin:0 auto;\&quot; /&gt;\n&lt;/figure&gt;\n&lt;div style=\&quot;text-align:center; font-size:0.85rem;color:#64748b;margin-top:.4rem;\&quot;&gt;Right side is my router, and left side is eduroam.&lt;/div&gt;\n\nMy WAN uses Ethernet from my dorm. I know it is below 1000 Mbps but above 500 Mbps.\nI tested raw cable speed on my computer. This Wi-Fi 6 AP at 5 GHz reaches throughput\nclose to the Ethernet bottleneck.\n\nWi-Fi 7 AP at 6 GHz cannot be achieved yet in this setup because kernel `6.12` does not\nfully support 6 GHz AP mode for this card. If Raspberry Pi OS rolls out newer kernels\nlater this year, I will test Wi-Fi 7 again.\n\n## Hardware selection guide {#Hardware}\n\nSelecting hardware is important for a DIY router. In this tutorial I use a Raspberry Pi 5\nand MT7925 Wi-Fi card. MT7925 on Raspberry Pi 5 may require custom kernel builds,\nwhich adds complexity, but the cost is low compared to some full-feature Wi-Fi 7 cards.\nThis card currently has partial Wi-Fi 7 capability in this use case.\n\nIf you need Wi-Fi 7 as a client, check Intel BE200 / AX210 testing and reports.\nYou may want to read:\n\n&gt; [Exploring Wi-Fi 7 on a Raspberry Pi 5 by Jeff Geerling (Mar 14, 2025)](https://www.jeffgeerling.com/blog/2025/exploring-wifi-7-2-gbps-on-raspberry-pi-5/)\n\nFor AP mode, choose a Wi-Fi card that supports dual- or tri-band operation concurrently.\nMT7925 typically supports one active band at a time in this setup (either 2.4 GHz or 5 GHz).\n\n`MT7915` supports dual-band (2.4 and 5 GHz) for Wi-Fi 6. It is older, and Linux kernel support\nis more mature. See:\n\n&gt; [mt7915e driver fails to load on Raspberry Pi 5 with error -12](https://github.com/raspberrypi/linux/issues/7026)\n\nDriver issues can still occur; a custom kernel build may help. For `mt7925e`, without custom\nkernel changes, error `-12` can also appear.\n\n`QCM865` is also recommended by parts of the community and can provide full-speed Wi-Fi 7,\nbut a custom kernel may still be needed. See:\n\n&gt; [ath11k PCI Wi-Fi 6 card not detected](https://forums.raspberrypi.com/viewtopic.php?t=396484)\n\n`ath11k` is relevant for QCM865 as well and may not be fully enabled in your default\nRaspberry Pi OS kernel build.\n\n&gt; [!TIP]\n&gt; Mar 14 2026: Pi5 PCie can only provide limited power, so even if you got a strong card you might not be able to power\n&gt; it. Don&#39;t expect Pi to be a good at AP. Buy a cheap router and flash OpenWrt, and set that router\n&gt; as an AP. Why not just use a router? Normal router has limited system resources, but pi isn&#39;t you can do more customization.\n\n&lt;figure style=\&quot;text-align:center;\&quot;&gt;\n  &lt;img src=\&quot;/assets/2026-03-05-resources/1.avif\&quot; alt=\&quot;Pi router\&quot; style=\&quot;width:50%;max-width:440px;display:block;margin:0 auto;\&quot; /&gt;\n&lt;/figure&gt;\n\n&lt;figure style=\&quot;text-align:center;\&quot;&gt;\n  &lt;img src=\&quot;/assets/2026-03-05-resources/2.avif\&quot; alt=\&quot;Pi router\&quot; style=\&quot;width:50%;max-width:440px;display:block;margin:0 auto;\&quot; /&gt;\n&lt;/figure&gt;&quot;]}],[0,{&quot;slug&quot;:[0,&quot;2026-3-21-zeroclaw&quot;],&quot;data&quot;:[0,{&quot;title&quot;:[0,&quot;Running your own Jarvis on a 15$ computer&quot;],&quot;date&quot;:[3,&quot;2026-03-21T00:00:00.000Z&quot;],&quot;image&quot;:[0,&quot;/assets/2026-03-21-resources/5.jpeg&quot;],&quot;categories&quot;:[1,[[0,&quot;Tech&quot;]]],&quot;authors&quot;:[1,[[0,&quot;Zihao Fu&quot;]]],&quot;tags&quot;:[1,[[0,&quot;others&quot;]]],&quot;draft&quot;:[0,false]}],&quot;content&quot;:[0,&quot;&gt; How to build deploy your own AI Agent? This is a tutorial about installing zeroclaw\non your cheap hardware.\n\n&lt;!-- markdownlint-disable MD033 --&gt;\n&lt;!-- markdownlint-disable MD051 --&gt;\n\n&lt;figure style=\&quot;text-align:center;\&quot;&gt;\n  &lt;img src=\&quot;/assets/2026-03-21-resources/7.jpeg\&quot; alt=\&quot;Pi router\&quot; style=\&quot;width:50%;max-width:440px;display:block;margin:0 auto;\&quot; /&gt;\n&lt;/figure&gt;\n&lt;div style=\&quot;text-align:center; font-size:0.85rem;color:#64748b;margin-top:.4rem;\&quot;&gt;Raspberry pi zero 2w&lt;/div&gt;\n\nThis blog covered how to install alpine linux on raspberry pi zero2w, install\nOpenSSH, build zeroclaw against musl (latest or minor versions may not include musl support)\nand configure zeroclaw with OpenRC init system.\n\n&lt;figure style=\&quot;text-align:center;\&quot;&gt;\n  &lt;img src=\&quot;/assets/2026-03-21-resources/6.jpeg\&quot; alt=\&quot;Pi router\&quot; style=\&quot;width:50%;max-width:440px;display:block;margin:0 auto;\&quot; /&gt;\n&lt;/figure&gt;\n&lt;div style=\&quot;text-align:center; font-size:0.85rem;color:#64748b;margin-top:.4rem;\&quot;&gt;How it looks finally&lt;/div&gt;\n\n## Introduction\n\nZeroclaw is an Openclaw alternative, an autonomous AI agent. Openclaw is written in TypeScript, I do not like it at all. The runtime is heavy, while\nzeroclaw written in RUST, the response is almost instant. It is light, fast, efficient and superior to openclaw.\n\n## Jump Links\n\n1. [**flash Alpine Linux**](#Flash)\n2. [**preconfigure OpenSSH**](#ssh)\n3. [**How to build zeroclaw against musl?**](#build)\n4. [**Configure persistent service for zeroclaw**](#deploy)\n\n## Flash Alpine linux image onto raspi zero2w {#Flash}\n\nDownload the official [raspberry pi imager](https://www.raspberrypi.com/software/), and plug the SD card into your computer, follow its steps and\nflash the alpine Linux image.\n\nThe alpine linux image provided is a diskless image, which means the entire system will be running on RAM, we will configure that later when we log\ninto the machine. Don&#39;t unplug the SD card yet, we need to preconfigure OpenSSH.\n\n## Preconfigure OpenSSH on alpine linux {#ssh}\n\nDue to alpine linux nature, secure and minimum. It does not bundle the OpenBSD secure shell. We need a bootstrap program, that\nexecuted on the first boot and bring us OpenSSH. [Alpine Linux BootStrap Repo.](https://github.com/macmpi/alpine-linux-headless-bootstrap)\nGo to that github repo, download headless.apkovl.tar.gz and place it under /boot, the partition usually called PIBOOT. \n\nThen configure wifi with\n```bash\nwpa_passphrase &#39;YOUR_WIFI_NAME&#39; &#39;YOUR_WIFI_PASSWORD&#39; &gt; wpa_supplicant.conf\n```\n\nIf you want to use ssh public key login, place your public key inside a file called `authorized_keys`.\n\nFinally save all your modifications and eject it. Plug it in your raspi zero2w and boot it. \n\nTry ssh into your machine. If it did not respond, ping it first, then try again.\nI found the raspi zero2w alping wifi firmware quite unstable, so ping it first,\ncould save you lots of time debugging. [Alpine WIKI wireless driver post installation](https://wiki.alpinelinux.org/wiki/Raspberry_Pi#Wireless_drivers)\n\nAfter gaining access, run `setup-alpine` to make a proper installation on raspi zero2w,\nthen reboot, and `apk update &amp;&amp; apk upgrade` to keep software up to date.\n\n![/assets/2026-03-21-resources/4.jpeg](/assets/2026-03-21-resources/4.jpeg)\n\n## Build zeroclaw against musl C libray {#build}\n\nHere comes the interesting part. If you go to zeroclaw-labs/zeroclaw, you will find out they don&#39;t always provide linux-aarch64-musl binary. x86 and arm64\nglibc is usually provided, musl is ignored often. Then we must build it ourselves. The most straight forward way is to use a docker container as\nbuilder. \n\nAlpine uses musl libc instead of glibc. Prebuilt binaries targeting glibc will fail to run.\nTherefore we build inside an Alpine environment to ensure compatibility.\n\n```bash\ndocker run -it --dns 1.1.1.1  alpine:latest /bin/sh\n```\n\nYou will now inside containers root. It&#39;s recommend to check the network connections `ping 8.8.8.8` and `nslookup google.com`.\n\n### First install build essentials\n\n```bash\napk update\napk upgrade\napk add curl git gcc build-base\n\ncurl --proto &#39;=https&#39; --tlsv1.2 -sSf https://sh.rustup.rs | sh  # Install Rust\n```\n### Build the binary\n\n```bash\n# Clone the repo\n# You can specify a release tag, and clone with\n# git clone --branch &lt;tag name&gt; --depth 1 https://github.com/zeroclaw-labs/zeroclaw.git\n# This will save some time, and use smaller storage\ngit clone https://github.com/zeroclaw-labs/zeroclaw.git\n\ngit switch --detach &lt;release tag name&gt; # Find the latest release tag on github\n\ncargo build --release\n```\n\n### Transfer out the binary\n\nYou will find the binary at `target/release`, transfer it out to your destination. If your firewall\nallows containers to reach LAN, you can try `scp zeroclaw &lt;YOUR NAME&gt;@&lt;LAN IP ADDRESS&gt;`\n\nOtherwise, use `croc`, [schollz/croc](https://github.com/schollz/croc), which uses a public\nrelay node provided by the author to transfer file. Also please consider donation to this beautiful opensource\nsoftware.\n\n## Deploy and configure zeroclaw {#deploy}\n\nNow comes to the final section, deploy `zeroclaw` to the target machine, you should now have\nthe binary on your target machine.\n\n### Install zeroclaw\n\nInstall zeroclaw to local machine, `mv ./zeroclaw /usr/local/bin/`.\nYou should verify with `which zeroclaw` and `zeroclaw --version`, if instruction set matches,\nyou should not encounter any errors.\n\n### Configure zeroclaw daemon\n\nAlpine linux uses OpenRC init system. First add a dedicated user for zeroclaw.\n\n```bash\nadduser zeroclaw\n# I should prompt you to enter password\n# Do not give Agent full root permission is a good practice\n``` \n\nHere we onboard zeroclaw\n```bash\nsu - zeroclaw\n# Follow onboard instructions, after you finish\n# run `exit` return to root user\n```\n\nNext configure the daemon unit file, `vi /etc/init.d/zeroclaw`,\npress i enter insert mode. Here is a example unit file.\n\n```conf\n#!/sbin/openrc-run\n\nname=\&quot;zeroclaw\&quot;\ndescription=\&quot;ZeroClaw daemon\&quot;\n\ncommand=\&quot;/usr/local/bin/zeroclaw\&quot;\ncommand_args=\&quot;--config-dir /home/zeroclaw/.zeroclaw daemon\&quot;\ncommand_user=\&quot;zeroclaw:zeroclaw\&quot;\ndirectory=\&quot;/home/zeroclaw\&quot;\n\nsupervisor=\&quot;supervise-daemon\&quot;\npidfile=\&quot;/run/${RC_SVCNAME}.pid\&quot;\n\noutput_log=\&quot;/var/log/zeroclaw/access.log\&quot;\nerror_log=\&quot;/var/log/zeroclaw/error.log\&quot;\n\nexport HOME=\&quot;/home/zeroclaw\&quot;\numask 027\n\ndepend() {\n    need net\n    after firewall\n}\n\nstart_pre() {\n    checkpath -d -o zeroclaw:zeroclaw -m 0755 /home/zeroclaw/.zeroclaw\n    checkpath -d -o zeroclaw:zeroclaw -m 0755 /var/log/zeroclaw\n}\n```\n\nUse `rc-service start zeroclaw` to start zeroclaw service, and use\n`rc-update add zeroclaw default` to make it presistent even after reboot.\n\n## Ending\n\nRaspi zero2w is a very tiny computer about 15$,\nwith quad A53 core running at 1.0GHz and 512 MB of RAM. \nAlpine linux is super light, which takes about 30MB of ram after boot. \nZeroclaw is light weight as well, uses about 20-30 MB. \nI also intalled tailscale on it, this will take another few MB. In total, it used about\n70MB.\n\n```bash\nzihao@alpine:~$ free -h\n              total        used        free      shared  buff/cache   available\nMem:         416.6M       65.8M      180.3M      320.0K      170.4M      340.1M\nSwap:             0           0           0\n```\n\n&lt;figure style=\&quot;text-align:center;\&quot;&gt;\n  &lt;img src=\&quot;/assets/2026-03-21-resources/1.jpeg\&quot; alt=\&quot;Pi router\&quot; style=\&quot;width:50%;max-width:440px;display:block;margin:0 auto;\&quot; /&gt;\n&lt;/figure&gt;\n\n&lt;figure style=\&quot;text-align:center;\&quot;&gt;\n  &lt;img src=\&quot;/assets/2026-03-21-resources/2.jpeg\&quot; alt=\&quot;Pi router\&quot; style=\&quot;width:50%;max-width:440px;display:block;margin:0 auto;\&quot; /&gt;\n&lt;/figure&gt;\n\n&gt; With this setup, you now have a persistent AI agent running on ultra-low-cost hardware.&quot;]}]]]}" ssr client="load" opts="{&quot;name&quot;:&quot;SearchBar&quot;,&quot;value&quot;:true}" await-children><div class="min-h-[45vh]"><input class="form-input w-full text-center" placeholder="Type here to Search posts" type="text" autoComplete="off" autofocus="" name="search" value=""/><div class="row"></div></div><!--astro:end--></astro-island> </div> </section>  </main> <footer class="section bg-dark"> <div class="container text-center">  <ul class="mb-8 space-x-4"> <li class="inline-block"> <a href="/" class="p-4 text-white/75 hover:text-white transition-all"> Home </a> </li><li class="inline-block"> <a href="/blog" class="p-4 text-white/75 hover:text-white transition-all"> Blog </a> </li><li class="inline-block"> <a href="/archive" class="p-4 text-white/75 hover:text-white transition-all"> Archive </a> </li><li class="inline-block"> <a href="/about" class="p-4 text-white/75 hover:text-white transition-all"> About </a> </li><li class="inline-block"> <a href="/resume" class="p-4 text-white/75 hover:text-white transition-all"> Resume </a> </li> </ul>  <ul class="social-icons mb-8"> <li> <a aria-label="GitHub" href="https://github.com/ZihaoFU245" target="_blank" rel="noopener noreferrer nofollow"> <span class="sr-only">GitHub</span> <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 496 512" class="inline-block" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="M165.9 397.4c0 2-2.3 3.6-5.2 3.6-3.3.3-5.6-1.3-5.6-3.6 0-2 2.3-3.6 5.2-3.6 3-.3 5.6 1.3 5.6 3.6zm-31.1-4.5c-.7 2 1.3 4.3 4.3 4.9 2.6 1 5.6 0 6.2-2s-1.3-4.3-4.3-5.2c-2.6-.7-5.5.3-6.2 2.3zm44.2-1.7c-2.9.7-4.9 2.6-4.6 4.9.3 2 2.9 3.3 5.9 2.6 2.9-
