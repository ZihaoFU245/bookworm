name: Publish Site

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Enable Git LFS
        run: git lfs install

      - name: Install dependencies
        run: corepack yarn install --frozen-lockfile

      - name: Build site
        run: corepack yarn build

      - name: Compress assets
        run: |
          chmod +x ./compress.sh
          ./compress.sh

      - name: Copy LFS rules into publish directory
        run: cp .gitattributes dist/.gitattributes

      - name: Publish dist to site branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: site
          force_orphan: true
